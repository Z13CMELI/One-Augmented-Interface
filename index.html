}

function WIPOverlay({ pageName, lang }) {
    return (
        <div style={{
            position: "absolute", inset: 0, zIndex: 200,
            backdropFilter: "blur(7px)", WebkitBackdropFilter: "blur(7px)",
            background: "rgba(245,244,245,0.72)",
            display: "flex", alignItems: "center", justifyContent: "center",
            fontFamily: SeasonPlanningPage_FONT,
        }}>
            <div style={{
                background: SeasonPlanningPage_V.white, borderRadius: 16,
                border: `1px solid ${SeasonPlanningPage_V.borderQ}`,
                boxShadow: "0 12px 48px rgba(0,0,0,.14)",
                padding: "36px 40px", maxWidth: 480, textAlign: "center",
                display: "flex", flexDirection: "column", alignItems: "center", gap: 14,
            }}>
                {/* Icône chantier */}
                <div style={{
                    width: 56, height: 56, borderRadius: 16,
                    background: SeasonPlanningPage_V.warningQ, border: `1px solid ${SeasonPlanningPage_V.warning}44`,
                    display: "flex", alignItems: "center", justifyContent: "center",
                    fontSize: 26,
                }}>🚧</div>
                <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                    <span style={{ fontSize: 16, fontWeight: 800, color: SeasonPlanningPage_V.neutral }}>
                        {pageName} {_t(lang, "wip_suffix")}
                    </span>
                    <span style={{ fontSize: 13, color: SeasonPlanningPage_V.quiet, lineHeight: 1.55 }}>
                        {_t(lang, "wip_subtitle")}
                    </span>
                </div>
                <div style={{
                    background: SeasonPlanningPage_V.brandQuiet, borderRadius: 10,
                    padding: "12px 16px",
                    fontSize: 13, fontWeight: 600, color: SeasonPlanningPage_V.brand,
                    lineHeight: 1.5,
                }}>
                    {_t(lang, "wip_question")}
                </div>
            </div>
        </div>
    );
}

function SeasonPlanningPage({ onGoHome, onGoToCockpit, onReplenishment, onShortage, onOpenSettings, onStartTour, persona, setPersona, lang }) {
    const [selectedSeason, setSelectedSeason] = useState("S26H");
    const season = SEASONS.find(s => s.id === selectedSeason);
    const [notifOpen, setNotifOpen] = useState(false);

    return (
        <div style={{ display: "flex", flexDirection: "column", height: "100%", background: SeasonPlanningPage_V.bgAlt, fontFamily: SeasonPlanningPage_FONT, overflow: "hidden" }}>
            <SeasonPlanningPage_TopRibbon persona={persona} setPersona={setPersona} onGoHome={onGoHome} onGoToCockpit={onGoToCockpit} onReplenishment={onReplenishment} onShortage={onShortage} onOpenNotif={() => setNotifOpen(o => !o)} notifUnread={NOTIF_UNREAD_COUNT} onOpenSettings={onOpenSettings} onStartTour={onStartTour} lang={lang}/>
            <AnimatePresence>{notifOpen && <NotificationPanel onClose={() => setNotifOpen(false)} />}</AnimatePresence>

            {/* Sous-header */}
            <div style={{ flexShrink: 0, height: 40, background: SeasonPlanningPage_V.bgMain, borderBottom: `1px solid ${SeasonPlanningPage_V.borderQ}`, display: "flex", alignItems: "center", padding: "0 16px", gap: 10 }}>
                <SeasonPlanningPage_Icon name="calendar" size={14} color={SeasonPlanningPage_V.quiet} />
                <span style={{ fontSize: 12, fontWeight: 800, color: SeasonPlanningPage_V.neutral }}>{_t(lang, "page_season_planning")}</span>
                <div style={{ flex: 1 }} />
                <span style={{ fontSize: 12, color: SeasonPlanningPage_V.quiet }}>{_t(lang, "season_active_label")} <b style={{ color: SeasonPlanningPage_V.neutral }}>S26 Hiver</b></span>
            </div>

            <div style={{ flex: 1, minHeight: 0, overflowY: "auto", padding: 16, display: "flex", flexDirection: "column", gap: 14, position: "relative" }}>
                <WIPOverlay pageName={_t(lang, "page_season_planning")} lang={lang} />

                {/* Sélecteur de saison */}
                <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 10 }}>
                    {SEASONS.map(s => {
                        const st = statusColors[s.status];
                        const sel = s.id === selectedSeason;
                        return (
                            <motion.button key={s.id} whileHover={{ y: -2 }} onClick={() => setSelectedSeason(s.id)}
                                style={{
                                    textAlign: "left", padding: "12px 14px", borderRadius: 8, border: `1px solid ${sel ? SeasonPlanningPage_V.brand : SeasonPlanningPage_V.borderQ}`,
                                    background: sel ? SeasonPlanningPage_V.brandQuiet : SeasonPlanningPage_V.bgMain, cursor: "pointer", fontFamily: SeasonPlanningPage_FONT,
                                    boxShadow: sel ? `0 0 0 1px ${SeasonPlanningPage_V.brand}` : "none"
                                }}>
                                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
                                    <span style={{ fontSize: 13, fontWeight: 800, color: sel ? SeasonPlanningPage_V.brand : SeasonPlanningPage_V.neutral }}>{s.label}</span>
                                    <span style={{ fontSize: 11, fontWeight: 700, color: st.fg, background: st.bg, padding: "2px 8px", borderRadius: 8 }}>{_t(lang, st.labelKey)}</span>
                                </div>
                                <div style={{ height: 4, background: SeasonPlanningPage_V.greyQuiet, borderRadius: 2, overflow: "hidden" }}>
                                    <motion.div animate={{ width: `${s.progress}%` }} transition={{ duration: 0.6, ease: SeasonPlanningPage_EASE }}
                                        style={{ height: "100%", background: sel ? SeasonPlanningPage_V.brand : st.fg, borderRadius: 2 }} />
                                </div>
                                <div style={{ display: "flex", justifyContent: "space-between", marginTop: 6, fontSize: 11, color: SeasonPlanningPage_V.quiet }}>
                                    <span>{_t(lang, "season_card_budget_label")} <b style={{ color: SeasonPlanningPage_V.neutral }}>{s.budget}</b></span>
                                    <span>{s.progress}%</span>
                                </div>
                            </motion.button>
                        );
                    })}
                </div>

                {/* Grille principale */}
                <div style={{ flex: 1, display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, minHeight: 0 }}>

                    {/* Construction du plan par famille */}
                    <div style={{ background: SeasonPlanningPage_V.bgMain, border: `1px solid ${SeasonPlanningPage_V.borderQ}`, borderRadius: 8, display: "flex", flexDirection: "column", overflow: "hidden" }}>
                        <div style={{ padding: "12px 14px", borderBottom: `1px solid ${SeasonPlanningPage_V.borderQ}`, display: "flex", alignItems: "center", gap: 8 }}>
                            <SeasonPlanningPage_Icon name="layers" size={15} color={SeasonPlanningPage_V.neutral} />
                            <span style={{ fontSize: 13, fontWeight: 800, color: SeasonPlanningPage_V.neutral }}>{_t(lang, "section_construction_by_family")}</span>
                            <span style={{ fontSize: 12, color: SeasonPlanningPage_V.quiet, marginLeft: "auto" }}>{season?.label}</span>
                        </div>
                        <div style={{ flex: 1, overflowY: "auto" }}>
                            {SeasonPlanningPage_FAMILIES.map(f => {
                                const pct = Math.round(f.built / f.target * 100);
                                const st = statusColors[f.status];
                                return (
                                    <div key={f.id} style={{ padding: "10px 14px", borderBottom: `1px solid ${SeasonPlanningPage_V.borderQ}` }}>
                                        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 6 }}>
                                            <span style={{ fontSize: 12, fontWeight: 700, color: SeasonPlanningPage_V.neutral }}>{f.label}</span>
                                            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                                                <span style={{ fontSize: 11, color: SeasonPlanningPage_V.quiet }}>{f.built.toLocaleString("fr-FR")} / {f.target.toLocaleString("fr-FR")} u</span>
                                                <span style={{ fontSize: 11, fontWeight: 700, color: st.fg, background: st.bg, padding: "2px 8px", borderRadius: 8 }}>{_t(lang, st.labelKey)}</span>
                                            </div>
                                        </div>
                                        <div style={{ height: 6, background: SeasonPlanningPage_V.greyQuiet, borderRadius: 3, overflow: "hidden" }}>
                                            <motion.div animate={{ width: `${Math.min(pct, 100)}%` }} transition={{ duration: 0.5, ease: SeasonPlanningPage_EASE }}
                                                style={{ height: "100%", background: st.fg, borderRadius: 3 }} />
                                        </div>
                                        <div style={{ marginTop: 4, fontSize: 11, color: SeasonPlanningPage_V.quiet, textAlign: "right" }}>{pct}%</div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    {/* Calendrier / jalons */}
                    <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
                        {/* KPIs saison */}
                        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10 }}>
                            {[
                                [_t(lang, "kpi_budget_allocated"), season?.budget || "—", SeasonPlanningPage_V.brand],
                                [_t(lang, "kpi_realized_projected"), season?.real || "—", SeasonPlanningPage_V.positive],
                                [_t(lang, "kpi_progress"), `${SEASONS.find(s => s.id === selectedSeason)?.progress}%`, SeasonPlanningPage_V.warning],
                            ].map(([k, v, c]) => (
                                <div key={k} style={{ background: SeasonPlanningPage_V.bgMain, border: `1px solid ${SeasonPlanningPage_V.borderQ}`, borderRadius: 8, padding: "12px 14px" }}>
                                    <div style={{ fontSize: 11, color: SeasonPlanningPage_V.quiet, fontWeight: 600, marginBottom: 4 }}>{k}</div>
                                    <div style={{ fontSize: 18, fontWeight: 800, color: c }}>{v}</div>
                                </div>
                            ))}
                        </div>

                        {/* Jalons */}
                        <div style={{ background: SeasonPlanningPage_V.bgMain, border: `1px solid ${SeasonPlanningPage_V.borderQ}`, borderRadius: 8, overflow: "hidden", flex: 1 }}>
                            <div style={{ padding: "12px 14px", borderBottom: `1px solid ${SeasonPlanningPage_V.borderQ}`, display: "flex", alignItems: "center", gap: 8 }}>
                                <SeasonPlanningPage_Icon name="target" size={15} color={SeasonPlanningPage_V.neutral} />
                                <span style={{ fontSize: 13, fontWeight: 800, color: SeasonPlanningPage_V.neutral }}>{_t(lang, "section_milestones")}</span>
                            </div>
                            {[
                                { date: "12 janv.", label: "Kick-off S26 Hiver", done: true },
                                { date: "28 janv.", label: "Validation cibles familles", done: true },
                                { date: "14 fév.", label: "Revue intermédiaire ZDP", done: false, current: true },
                                { date: "3 mars", label: "Gel des prévisions initiales", done: false },
                                { date: "17 mars", label: "Validation finale direction", done: false },
                                { date: "1er avr.", label: "Lancement plan de réassort", done: false },
                            ].map((m, i) => (
                                <div key={i} style={{
                                    display: "flex", alignItems: "center", gap: 12, padding: "10px 14px",
                                    borderBottom: `1px solid ${SeasonPlanningPage_V.borderQ}`,
                                    background: m.current ? SeasonPlanningPage_V.brandQuiet : "transparent"
                                }}>
                                    <div style={{
                                        width: 24, height: 24, borderRadius: "50%", flexShrink: 0,
                                        background: m.done ? SeasonPlanningPage_V.positive : m.current ? SeasonPlanningPage_V.brand : SeasonPlanningPage_V.greyQuiet,
                                        display: "flex", alignItems: "center", justifyContent: "center"
                                    }}>
                                        {m.done ? <SeasonPlanningPage_Icon name="check" size={13} color="#fff" /> : null}
                                    </div>
                                    <div style={{ flex: 1 }}>
                                        <div style={{ fontSize: 12, fontWeight: m.current ? 800 : 600, color: m.current ? SeasonPlanningPage_V.brand : SeasonPlanningPage_V.neutral }}>{m.label}</div>
                                        <div style={{ fontSize: 11, color: SeasonPlanningPage_V.quiet }}>{m.date}</div>
                                    </div>
                                    {m.current && <span style={{ fontSize: 11, fontWeight: 700, color: SeasonPlanningPage_V.brand, background: SeasonPlanningPage_V.brandQuiet, border: `1px solid ${SeasonPlanningPage_V.brand}`, padding: "2px 8px", borderRadius: 8 }}>{_t(lang, "milestone_badge_current")}</span>}
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            </div>
        </div>
    );
}

    }[name];
    return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" style={{ flexShrink: 0, display: "block" }}>{p}</svg>;
};

                        <span style={{ fontSize: 11, color: ReplenishmentPage_V.quiet, marginLeft: "auto" }}>{_t(lang, "suggested_actions_subtitle")}</span>
                    </div>
                    <div style={{ padding: "12px 16px", display: "flex", flexDirection: "column", gap: 8 }}>
                        {REPLENISHMENT_ACTIONS.map((ac, i) => <ReplenishmentActionItem key={i} ac={ac} lang={lang} />)}
                    </div>
                </div>
            </div>
        </div>
    );
}

function CoverageBar({ cov, target }) {
    const pct = Math.min(cov / target * 100, 100);
    const color = cov < target * 0.35 ? ShortageAlertPage_V.negative : cov < target * 0.6 ? ShortageAlertPage_V.warning : ShortageAlertPage_V.positive;
    return (
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <div style={{ flex: 1, height: 6, background: ShortageAlertPage_V.greyQuiet, borderRadius: 3, overflow: "hidden" }}>

            </div>
            <span style={{ fontSize: 11, fontWeight: 800, color, minWidth: 32 }}>{cov}j</span>

}

                    <div style={{ flexShrink: 0, padding: "12px 16px 0", display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 8 }}>
                        {[
                            ["Alertes actives", `${visible.length}`, ShortageAlertPage_V.neutral],
                            [ _t(lang,"kpi_p0_urgencies"), `${visible.filter(a => a.priority === "P0").length}`, ShortageAlertPage_V.negative],
                            [ _t(lang,"kpi_skus_impacted"), `${visible.length}`, ShortageAlertPage_V.warning],
                            [ _t(lang,"kpi_total_ca_impact"), `€${Math.round(totalImpact / 1000)}k`, ShortageAlertPage_V.negative],
                        ].map(([k, v, c]) => (
                            <div key={k} style={{ background: ShortageAlertPage_V.bgMain, border: `1px solid ${ShortageAlertPage_V.borderQ}`, borderRadius: 8, padding: "10px 12px" }}>
                                <div style={{ fontSize: 10, color: ShortageAlertPage_V.quiet, fontWeight: 600, marginBottom: 3 }}>{k}</div>
                                <div style={{ fontSize: 18, fontWeight: 800, color: c }}>{v}</div>
                            </div>
                        ))}
                    </div>

                    {/* Liste */}
                    <div style={{ flex: 1, overflowY: "auto", padding: 16, display: "flex", flexDirection: "column", gap: 8 }}>
                        <AnimatePresence>
                            {visible.map((a, i) => {
                                const p = prio[a.priority];
                                const isSel = a.id === selected;
                                return (
                                    <motion.div key={a.id} layout initial={{ opacity: 0, y: 8 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0, x: -20, height: 0, marginBottom: 0 }}
                                        transition={{ delay: i * 0.04, duration: 0.25, ease: ShortageAlertPage_EASE }}
                                        onClick={() => setSelected(isSel ? null : a.id)}
                                        style={{
                                            background: isSel ? ShortageAlertPage_V.bgAlt : ShortageAlertPage_V.bgMain,
                                            border: `1px solid ${isSel ? ShortageAlertPage_V.brand : a.priority === "P0" ? ShortageAlertPage_V.negative + "66" : ShortageAlertPage_V.borderQ}`,
                                            borderRadius: 8, padding: "12px 14px", cursor: "pointer",
                                            boxShadow: isSel ? `0 0 0 2px ${ShortageAlertPage_V.brand}44` : "none"
                                        }}>
                                        <div style={{ display: "flex", alignItems: "flex-start", gap: 10, marginBottom: 8 }}>
                                            <div style={{ marginTop: 2 }}>
                                                <ShortageAlertPage_Icon name="alert" size={16} color={a.priority === "P0" ? ShortageAlertPage_V.negative : a.priority === "P1" ? ShortageAlertPage_V.warning : ShortageAlertPage_V.brand} />
                                            </div>
                                            <div style={{ flex: 1, minWidth: 0 }}>
                                                <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 3 }}>
                                                    <span style={{ fontSize: 12, fontWeight: 800, color: ShortageAlertPage_V.neutral, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{a.label}</span>
                                                    <span style={{ fontSize: 11, fontWeight: 700, color: p.fg, background: p.bg, padding: "1px 7px", borderRadius: 8, flexShrink: 0 }}>{a.priority}</span>
                                                    {a.actions > 0 && <span style={{ fontSize: 11, fontWeight: 700, color: ShortageAlertPage_V.brand, background: ShortageAlertPage_V.brandQuiet, padding: "1px 7px", borderRadius: 8, flexShrink: 0 }}>{a.actions} action{a.actions > 1 ? "s" : ""}</span>}
                                                </div>
                                                <div style={{ fontSize: 11, color: ShortageAlertPage_V.quiet, fontFamily: "monospace" }}>{a.sku} · {a.family} · Zone {a.zone}</div>
                                            </div>
                                            <button onClick={e => { e.stopPropagation(); setDismissed(d => new Set([...d, a.id])); if (selected === a.id) setSelected(null); }}
                                                style={{ background: "none", border: "none", cursor: "pointer", padding: 2, color: ShortageAlertPage_V.quiet, flexShrink: 0 }}>
                                                <ShortageAlertPage_Icon name="x" size={14} color={ShortageAlertPage_V.quiet} />
                                            </button>
                                        </div>
                                        <CoverageBar cov={a.covJ} target={a.covTarget} />
                                        <div style={{ display: "flex", justifyContent: "space-between", marginTop: 8, fontSize: 11, color: ShortageAlertPage_V.quiet }}>
                                            <span>{_t(lang, "alert_coverage_target_prefix")} {a.covTarget}j {_t(lang, "alert_coverage_target_suffix")}</span>
                                            <span style={{ color: ShortageAlertPage_V.negative, fontWeight: 700 }}>{_t(lang, "alert_estimated_impact")} €{a.impactCA.toLocaleString("fr-FR")}</span>
                                        </div>
                                    </motion.div>
                                );
                            })}
                        </AnimatePresence>
                        {visible.length === 0 && (
                            <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 12, color: ShortageAlertPage_V.quiet }}>
                                <ShortageAlertPage_Icon name="check" size={40} color={ShortageAlertPage_V.positive} />
                                <span style={{ fontSize: 14, fontWeight: 700, color: ShortageAlertPage_V.positive }}>{_t(lang, "shortage_empty_state")}</span>
                            </div>
                        )}
                    </div>
                </div>

                {/* Panneau détail */}
                <AnimatePresence>
                    {sel && (
                        <motion.div key={sel.id} initial={{ opacity: 0, x: 40 }} animate={{ opacity: 1, x: 0 }} exit={{ opacity: 0, x: 40 }}
                            transition={{ duration: 0.3, ease: ShortageAlertPage_EASE }}
                            style={{ flex: 1, minWidth: 0, background: ShortageAlertPage_V.bgMain, borderLeft: `1px solid ${ShortageAlertPage_V.borderQ}`, display: "flex", flexDirection: "column", overflow: "hidden" }}>

                            {/* Header panneau */}
                            <div style={{ flexShrink: 0, padding: "14px 20px", borderBottom: `1px solid ${ShortageAlertPage_V.borderQ}`, display: "flex", alignItems: "flex-start", gap: 12 }}>
                                <div style={{ flex: 1 }}>
                                    <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
                                        <span style={{ fontSize: 14, fontWeight: 800, color: ShortageAlertPage_V.neutral }}>{sel.label}</span>
                                        <span style={{ fontSize: 12, fontWeight: 700, color: prio[sel.priority].fg, background: prio[sel.priority].bg, padding: "2px 8px", borderRadius: 8 }}>{sel.priority}</span>
                                    </div>
                                    <span style={{ fontSize: 12, color: ShortageAlertPage_V.quiet }}>{sel.sku} · {sel.family} · Zone {sel.zone}</span>
                                </div>
                                <button onClick={() => setSelected(null)} style={{ background: "none", border: "none", cursor: "pointer" }}>
                                    <ShortageAlertPage_Icon name="x" size={16} color={ShortageAlertPage_V.quiet} />
                                </button>
                            </div>

                            <div style={{ flex: 1, overflowY: "auto", padding: 20, display: "flex", flexDirection: "column", gap: 16 }}>

                                {/* Métriques clés */}
                                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10 }}>
                                    {[
                                        [_t(lang, "detail_current_coverage"), `${sel.covJ}j`, sel.covJ < sel.covTarget * 0.35 ? ShortageAlertPage_V.negative : ShortageAlertPage_V.warning],
                                        [_t(lang, "detail_target_coverage"), `${sel.covTarget}j`, ShortageAlertPage_V.quiet],
                                        [_t(lang, "detail_estimated_impact"), `€${sel.impactCA.toLocaleString("fr-FR")}`, ShortageAlertPage_V.negative],
                                    ].map(([k, v, c]) => (
                                        <div key={k} style={{ background: ShortageAlertPage_V.bgAlt, border: `1px solid ${ShortageAlertPage_V.borderQ}`, borderRadius: 8, padding: "10px 12px" }}>
                                            <div style={{ fontSize: 10, color: ShortageAlertPage_V.quiet, fontWeight: 600, marginBottom: 4 }}>{k}</div>
                                            <div style={{ fontSize: 20, fontWeight: 800, color: c }}>{v}</div>
                                        </div>
                                    ))}
                                </div>

                                {/* Visualisation couverture */}
                                <div style={{ background: ShortageAlertPage_V.bgMain, border: `1px solid ${ShortageAlertPage_V.borderQ}`, borderRadius: 8, padding: "14px 16px" }}>
                                    <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12 }}>
                                        <div style={{ fontSize: 12, fontWeight: 800, color: ShortageAlertPage_V.neutral }}>{_t(lang, "detail_coverage_chart_title")}</div>
                                        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                                            <span style={{ display: "flex", alignItems: "center", gap: 5, fontSize: 11, color: ShortageAlertPage_V.positive }}>
                                                <span style={{ width: 20, height: 3, background: ShortageAlertPage_V.positive, display: "inline-block", borderRadius: 2 }} />Zone OK
                                            </span>
                                            <span style={{ display: "flex", alignItems: "center", gap: 5, fontSize: 11, color: ShortageAlertPage_V.negative }}>
                                                <span style={{ width: 20, height: 3, background: ShortageAlertPage_V.negative, display: "inline-block", borderRadius: 2 }} />Zone rupture
                                            </span>
                                            <span style={{ display: "flex", alignItems: "center", gap: 5, fontSize: 11, color: ShortageAlertPage_V.brand }}>
                                                <span style={{ width: 20, height: 2, background: ShortageAlertPage_V.brand, display: "inline-block", borderRadius: 2 }} />Couverture
                                            </span>
                                        </div>
                                    </div>
                                    {(() => {
                                        const W = 460, H = 130, padL = 36, padR = 10, padT = 8, padB = 20;
                                        const plotW = W - padL - padR;
                                        const plotH = H - padT - padB;
                                        const maxVal = sel.covTarget * 1.5;
                                        const yThreshold = sel.covTarget * 0.5; // rupture threshold
                                        const vals = [sel.covJ, Math.max(sel.covJ - 2, 0), Math.max(sel.covJ - 3, 0), Math.max(sel.covJ - 1, 0), sel.covJ + 2, sel.covJ + 6, sel.covJ + 10];
                                        const DAYS = ["Auj.", "+1j", "+2j", "+3j", "+4j", "+5j", "+6j"];
                                        const xFor = i => padL + (i / (vals.length - 1)) * plotW;
                                        const yFor = v => padT + plotH - Math.min(plotH, Math.max(0, (v / maxVal) * plotH));
                                        const yTarget = yFor(sel.covTarget);
                                        const yDanger = yFor(yThreshold);
                                        // smooth bezier path
                                        const pts = vals.map((v, i) => ({ x: xFor(i), y: yFor(v) }));
                                        const smoothCov = pts.map((p, i) => {
                                            if (i === 0) return `M ${p.x} ${p.y}`;
                                            const prev = pts[i - 1];
                                            const cpx = (prev.x + p.x) / 2;
                                            return `C ${cpx} ${prev.y} ${cpx} ${p.y} ${p.x} ${p.y}`;
                                        }).join(" ");
                                        return (
                                            <svg width="100%" height={H} viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="xMidYMid meet" style={{ display: "block" }}>
                                                {/* Zone fond */}
                                                <rect x={padL} y={padT} width={plotW} height={yDanger - padT} fill={ShortageAlertPage_V.positiveQ} rx="3" />
                                                <rect x={padL} y={yDanger} width={plotW} height={plotH - (yDanger - padT)} fill={ShortageAlertPage_V.negativeQ} rx="3" />
                                                {/* Lignes de grille horizontales */}
                                                {[0, sel.covTarget * 0.5, sel.covTarget, sel.covTarget * 1.5].map((v, i) => (
                                                    <g key={i}>
                                                        <line x1={padL} y1={yFor(v)} x2={W - padR} y2={yFor(v)} stroke={ShortageAlertPage_V.borderQ} strokeWidth="1" strokeDasharray="3 3" />
                                                        <text x={padL - 4} y={yFor(v) + 4} fontSize="9" fill={ShortageAlertPage_V.quiet} textAnchor="end" fontFamily="Inter,sans-serif">{Math.round(v)}j</text>
                                                    </g>
                                                ))}
                                                {/* Ligne cible */}
                                                <line x1={padL} y1={yTarget} x2={W - padR} y2={yTarget} stroke={ShortageAlertPage_V.positive} strokeWidth="1.5" strokeDasharray="6 3" />
                                                <rect x={padL + 4} y={yTarget - 12} width={52} height={14} rx="3" fill={ShortageAlertPage_V.positiveQ} />
                                                <text x={padL + 30} y={yTarget - 2} fontSize="9" fill={ShortageAlertPage_V.positive} fontWeight="bold" textAnchor="middle" fontFamily="Inter,sans-serif">Cible {sel.covTarget}j</text>
                                                {/* Courbe lissée */}
                                                <path d={smoothCov} stroke={ShortageAlertPage_V.brand} strokeWidth="2.5" fill="none" strokeLinecap="round" />
                                                {/* Points de données */}
                                                {pts.map((p, i) => (
                                                    <g key={i}>
                                                        <circle cx={p.x} cy={p.y} r="4" fill={vals[i] < yThreshold ? ShortageAlertPage_V.negative : i === 0 ? ShortageAlertPage_V.warning : ShortageAlertPage_V.brand} stroke="#fff" strokeWidth="1.5" />
                                                        {i === 0 && (
                                                            <g>
                                                                <rect x={p.x + 6} y={p.y - 12} width={44} height={14} rx="3" fill={vals[i] < yThreshold ? ShortageAlertPage_V.negative : ShortageAlertPage_V.warning} />
                                                                <text x={p.x + 28} y={p.y - 2} fontSize="9" fill="#fff" fontWeight="bold" textAnchor="middle" fontFamily="Inter,sans-serif">{vals[i]}j auj.</text>
                                                            </g>
                                                        )}
                                                    </g>
                                                ))}
                                                {/* Axe X labels */}
                                                {DAYS.map((d, i) => (
                                                    <text key={i} x={xFor(i)} y={H - 4} fontSize="9" fill={ShortageAlertPage_V.quiet} textAnchor="middle" fontFamily="Inter,sans-serif">{d}</text>
                                                ))}
                                            </svg>
                                        );
                                    })()}
                                </div>

                                {/* Actions recommandées */}
                                <div style={{ background: ShortageAlertPage_V.bgAlt, border: `1px solid ${ShortageAlertPage_V.borderQ}`, borderRadius: 8, overflow: "hidden" }}>
                                    <div style={{ padding: "10px 14px", borderBottom: `1px solid ${ShortageAlertPage_V.borderQ}`, display: "flex", alignItems: "center", gap: 8 }}>
                                        <ShortageAlertPage_Icon name="target" size={14} color={ShortageAlertPage_V.brand} />
                                        <span style={{ fontSize: 12, fontWeight: 800, color: ShortageAlertPage_V.neutral }}>{_t(lang, "section_recommended_actions")}</span>
                                    </div>
                                    {[
                                        { label: "Lancer un ordre de réassort urgent", detail: `+${sel.covTarget - sel.covJ}j de couverture attendue sous 5j`, type: "primary" },
                                        { label: "Réallouer stock depuis zone excédentaire", detail: "Zone ALP : +4j disponibles — délai : 2j", type: "secondary" },
                                        { label: "Ajuster la prévision de demande", detail: "Réduire la prévision de 15% pour limiter l'exposition", type: "tertiary" },
                                    ].map((ac, i) => (
                                        <div key={i} style={{ display: "flex", alignItems: "center", gap: 12, padding: "10px 14px", borderBottom: `1px solid ${ShortageAlertPage_V.borderQ}` }}>
                                            <div style={{ width: 26, height: 26, borderRadius: "50%", background: ac.type === "primary" ? ShortageAlertPage_V.brand : ShortageAlertPage_V.brandQuiet, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                                                <ShortageAlertPage_Icon name="arrowUp" size={13} color={ac.type === "primary" ? ShortageAlertPage_V.white : ShortageAlertPage_V.brand} />
                                            </div>
                                            <div style={{ flex: 1 }}>
                                                <div style={{ fontSize: 12, fontWeight: 700, color: ShortageAlertPage_V.neutral }}>{ac.label}</div>
                                                <div style={{ fontSize: 11, color: ShortageAlertPage_V.quiet }}>{ac.detail}</div>
                                            </div>
                                            <motion.button whileHover={{ scale: 1.04 }} whileTap={{ scale: 0.97 }}
                                                onClick={() => setAppliedActions(s => { const ns = new Set(s); if (ns.has(i)) ns.delete(i); else ns.add(i); return ns; })}
                                                style={{
                                                    padding: "5px 12px", borderRadius: 8, fontSize: 11, fontWeight: 700,
                                                    background: appliedActions.has(i) ? ShortageAlertPage_V.positive : (ac.type === "primary" ? ShortageAlertPage_V.brand : ShortageAlertPage_V.bgMain),
                                                    color: appliedActions.has(i) ? ShortageAlertPage_V.white : (ac.type === "primary" ? ShortageAlertPage_V.white : ShortageAlertPage_V.brand),
                                                    border: `1px solid ${appliedActions.has(i) ? ShortageAlertPage_V.positive : (ac.type === "primary" ? ShortageAlertPage_V.brand : ShortageAlertPage_V.borderQ)}`,
                                                    cursor: "pointer", fontFamily: ShortageAlertPage_FONT, transition: "all .18s"
                                                }}>
                                                {appliedActions.has(i) ? _t(lang, "btn_applied") : _t(lang, "btn_apply_action")}
                                            </motion.button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </motion.div>
                    )}
                </AnimatePresence>
            </div>
        </div>
    );
}

                                    </div>
                                    <CT_Toggle on={r.active} onChange={() => toggleRule(r.id)}/>
                                </div>
                                {r.active && (
                                    <>
                                        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 4 }}>
                                            <span style={{ fontSize: 11, color: CT_V.quiet }}>{_t(lang, "ct_threshold_label")}</span>
                                            <span style={{ fontSize: 12, fontWeight: 700, color: CT_V.purple }}>±{thresholds[r.id]}%</span>
                                        </div>
                                        <input type="range" min={1} max={20} value={thresholds[r.id]}
                                            onChange={e => setThresholds(prev => ({ ...prev, [r.id]: +e.target.value }))}
                                            style={{ width: "100%", accentColor: CT_V.purple, cursor: "pointer" }}/>
                                        <div style={{ display: "flex", alignItems: "center", gap: 12, marginTop: 8 }}>
                                            <span style={{ fontSize: 11, color: CT_V.quiet }}>
                                                <b style={{ color: CT_V.purple }}>{r.execCount}</b> {_t(lang, "ct_exec_count_suffix")}
                                            </span>
                                            <span style={{ fontSize: 11, color: CT_V.quiet }}>{_t(lang, "ct_last_run_prefix")} {r.lastRun}</span>
                                        </div>
                                    </>
                                )}
                            </motion.div>
                        ))}
                    </div>
                </div>

                {/* COL 2 — Autonomous activity */}
                <div style={{ background: CT_V.bgMain, borderRadius: 10, border: `1px solid ${CT_V.borderQ}`, padding: "18px 16px", display: "flex", flexDirection: "column" }}>
                    <SectionHeader icon="sparkle" title={_t(lang, "ct_col2_title")} subtitle={_t(lang, "ct_col2_subtitle")}/>
                    <div style={{ flex: 1, overflowY: "auto", display: "flex", flexDirection: "column", gap: 0 }}>
                        {CT_AUTONOMOUS_FEED.map((f, i) => {
                            const c = PROV_COLORS[f.tag] || { fg: CT_V.brand, bg: CT_V.brandQuiet };
                            const tagLabel = f.tag === "Auto-IA" ? _t(lang, "ct_tag_auto_ia") : _t(lang, "ct_tag_reco_validated");
                            return (
                                <div key={f.id} style={{ display: "flex", gap: 10, padding: "10px 0", borderBottom: i < CT_AUTONOMOUS_FEED.length - 1 ? `1px solid ${CT_V.borderQ}` : "none" }}>
                                    <div style={{ width: 28, height: 28, borderRadius: 8, background: c.bg, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                                        <CT_Icon name={f.icon} size={14} color={c.fg}/>
                                    </div>
                                    <div style={{ flex: 1, minWidth: 0 }}>
                                        <div style={{ fontSize: 12, color: CT_V.neutral, lineHeight: 1.45 }}>{f.txt}</div>
                                        <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 4 }}>
                                            <span style={{ fontSize: 11, fontWeight: 700, color: c.fg, background: c.bg, padding: "1px 7px", borderRadius: 6 }}>{tagLabel}</span>
                                            <span style={{ fontSize: 11, color: CT_V.quiet }}>{f.ts}</span>
                                        </div>
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>

                {/* COL 3 — Adjustment registry */}
                <div style={{ background: CT_V.bgMain, borderRadius: 10, border: `1px solid ${CT_V.borderQ}`, padding: "18px 16px", display: "flex", flexDirection: "column" }}>
                    <SectionHeader icon="layers" title={_t(lang, "ct_col3_title")} subtitle={_t(lang, "ct_col3_subtitle")}/>
                    {/* Filters */}
                    <div style={{ display: "flex", gap: 6, marginBottom: 14, flexWrap: "wrap" }}>
                        {[["all", "ct_filter_all"], ["auto", "ct_filter_auto_ia"], ["reco", "ct_filter_reco"], ["deep", "ct_filter_deep_dive"]].map(([k, tk]) => (
                            <button key={k} onClick={() => setRegistryFilter(k)}
                                style={{ padding: "3px 10px", borderRadius: 999, border: `1px solid ${registryFilter === k ? CT_V.brand : CT_V.borderQ}`, background: registryFilter === k ? CT_V.brandQuiet : "transparent", color: registryFilter === k ? CT_V.brand : CT_V.quiet, fontSize: 11, fontWeight: registryFilter === k ? 700 : 500, cursor: "pointer", fontFamily: CT_FONT }}>
                                {_t(lang, tk)}
                            </button>
                        ))}
                    </div>
                    {/* Rollback toast */}
                    {rollbackToast && (
                        <motion.div initial={{ opacity: 0, y: -6 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0 }}
                            style={{ marginBottom: 10, background: CT_V.warningQ, border: `1px solid ${CT_V.warning}55`, borderRadius: 8, padding: "9px 12px", display: "flex", alignItems: "center", gap: 8, fontSize: 12, color: CT_V.warning, fontWeight: 600 }}>
                            <CT_Icon name="alert" size={14} color={CT_V.warning}/>
                            {lang === "en"
                                ? <>Rollback initiated — <b>{rollbackToast}</b> will be cancelled before SAP integration.</>
                                : <>Rollback déclenché — <b>{rollbackToast}</b> sera annulé avant intégration SAP.</>}
                        </motion.div>
                    )}
                    <div style={{ flex: 1, overflowY: "auto", display: "flex", flexDirection: "column", gap: 0 }}>
                        {filteredRegistry.map((r, i) => {
                            const c = PROV_COLORS[r.who] || { fg: CT_V.brand, bg: CT_V.brandQuiet };
                            const committed = r.state === "committed";
                            const isRolledBack = rolledBack.has(r.id);
                            const canRollback = r.who === "Auto-IA" && !isRolledBack;
                            const whoLabel = r.who === "Auto-IA" ? _t(lang, "ct_tag_auto_ia") : r.who === "Reco-Validée" ? _t(lang, "ct_tag_reco_validated") : _t(lang, "ct_who_deep_dive");
                            return (
                                <div key={r.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 0", borderBottom: i < filteredRegistry.length - 1 ? `1px solid ${CT_V.borderQ}` : "none", opacity: isRolledBack ? 0.45 : 1 }}>
                                    <div style={{ width: 28, height: 28, borderRadius: 8, background: c.bg, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                                        <CT_Icon name={r.icon} size={14} color={c.fg}/>
                                    </div>
                                    <div style={{ flex: 1, minWidth: 0 }}>
                                        <div style={{ fontSize: 12, fontWeight: 600, color: CT_V.neutral, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{r.scope}</div>
                                        <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 3 }}>
                                            <span style={{ fontSize: 11, fontWeight: 700, color: c.fg, background: c.bg, padding: "1px 7px", borderRadius: 6 }}>{whoLabel}</span>
                                            <span style={{ fontSize: 11, color: CT_V.quiet }}>{r.when}</span>
                                        </div>
                                    </div>
                                    {isRolledBack
                                        ? <span style={{ fontSize: 11, fontWeight: 700, color: CT_V.warning, flexShrink: 0 }}>Rollback</span>
                                        : committed
                                            ? <div style={{ display: "flex", alignItems: "center", gap: 8, flexShrink: 0 }}>
                                                <span style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 11, fontWeight: 700, color: CT_V.positive }}><CT_Icon name="check" size={12} color={CT_V.positive}/> {_t(lang, "registry_state_committed")}</span>
                                                {canRollback && (
                                                    <button onClick={() => handleRollback(r.id, r.scope)}
                                                        style={{ padding: "2px 9px", borderRadius: 6, border: `1px solid ${CT_V.warning}`, background: "transparent", color: CT_V.warning, fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: CT_FONT, transition: "background .12s" }}
                                                        onMouseEnter={e => { e.currentTarget.style.background = CT_V.warningQ; }}
                                                        onMouseLeave={e => { e.currentTarget.style.background = "transparent"; }}>
                                                        Rollback
                                                    </button>
                                                )}
                                              </div>
                                            : <span style={{ fontSize: 11, fontWeight: 700, color: CT_V.warning, background: CT_V.warningQ, padding: "2px 8px", borderRadius: 6, flexShrink: 0 }}>{_t(lang, "registry_state_in_transit")}</span>}
                                </div>
                            );
                        })}
                    </div>
                </div>
            </div>
        </div>
    );
}

  const [lang, setLang] = useState(null);
  const [showSplash, setShowSplash] = useState(true);
  const [view, setView] = useState("home");
  const [cockpitAlertId, setCockpitAlertId] = useState(null);
  const [persona, setPersona] = useState("ZDP");
  const [settingsOpen, setSettingsOpen] = useState(false);
  const [openTourOnCockpit, setOpenTourOnCockpit] = useState(false);

  const handleStart = (selectedLang) => {
    setLang(selectedLang);
    setShowSplash(false);
  };

  if (showSplash) {
    return <WelcomeSplash initialLang={lang || "fr"} onStart={handleStart} />;
  }

  const nav = {
    onGoHome: () => setView("home"),
    onGoToCockpit: (ex) => { setCockpitAlertId(ex?.id ?? null); setView("cockpit"); },
    onSeasonPlanning: () => setView("season-planning"),
    onReplenishment: () => setView("replenishment"),
    onShortage: () => setView("shortage"),
    onOpenSettings: () => setView("control-tower"),
    onStartTour: () => { setCockpitAlertId(null); setView("cockpit"); setOpenTourOnCockpit(true); },
  };

  const handlePersonaChange = (p) => {
    setPersona(p);
  };

  const sharedProps = { ...nav, persona, setPersona: handlePersonaChange, lang };

  return (
    <>
      {view === "home" && <OneInterfaceHome {...sharedProps} />}
      {view === "cockpit" && (
        <ForecastPilotingCockpit
          {...sharedProps}
          onGoHome={nav.onGoHome}
          initialAlertId={cockpitAlertId}
          openTour={openTourOnCockpit}
          onTourOpened={() => setOpenTourOnCockpit(false)}
        />
      )}
      {view === "season-planning" && <SeasonPlanningPage {...sharedProps} />}
      {view === "replenishment" && <ReplenishmentPage {...sharedProps} />}
      {view === "shortage" && <ShortageAlertPage {...sharedProps} />}
      {view === "control-tower" && (
        <ControlTowerPage
          {...sharedProps}
          onGoHome={nav.onGoHome}
          onGoToCockpit={nav.onGoToCockpit}
          onSeasonPlanning={nav.onSeasonPlanning}
          onReplenishment={nav.onReplenishment}
          onShortage={nav.onShortage}
          onOpenSettings={() => setView("control-tower")}
        />
      )}

      <AnimatePresence>
        {settingsOpen && <SettingsPanel key="global-settings" onClose={() => setSettingsOpen(false)} lang={lang} />}
      </AnimatePresence>

      {/* Floating briefing button */}
      <button
        onClick={() => setShowSplash(true)}
        title={lang === "en" ? "Tester Briefing" : "Note aux testeurs"}
        style={{
          position: "fixed", bottom: 24, right: 24, zIndex: 8000,
          width: 40, height: 40, borderRadius: "50%",
          background: "rgba(54,67,186,0.85)", border: "1px solid rgba(54,67,186,0.6)",
          backdropFilter: "blur(12px)",
          color: "#fff", fontSize: 16, fontWeight: 700,
          cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center",
          boxShadow: "0 4px 20px rgba(54,67,186,0.4)",
          transition: "all 0.18s",
        }}
        onMouseEnter={e => { e.currentTarget.style.transform = "scale(1.1)"; e.currentTarget.style.background = "#3643BA"; }}
        onMouseLeave={e => { e.currentTarget.style.transform = "scale(1)"; e.currentTarget.style.background = "rgba(54,67,186,0.85)"; }}
      >
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="8" r="7" stroke="currentColor" strokeWidth="1.4"/>
          <path d="M8 7v5M8 5v.5" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/>
        </svg>
      </button>
    </>
  );
}


// Mount
const rootEl = document.getElementById('root');
const reactRoot = ReactDOM.createRoot(rootEl);
reactRoot.render(React.createElement(App));

</script>

  try {

      presets: [['react', { runtime: 'classic' }]],
      filename: 'app.jsx'
    });
    eval(result.code);
  } catch(e) {
    document.getElementById('root').innerHTML =
      '<pre style="color:red;padding:20px;white-space:pre-wrap">' +

  }

</body>

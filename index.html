const Pill = ({ children, kind = "primary", onClick, icon, style }) => {
    const map = {
        primary: { bg: V.brand, bd: V.brand, fg: V.white },
        secondary: { bg: V.white, bd: V.borderN, fg: V.neutral },
        ghost: { bg: "transparent", bd: "transparent", fg: V.brand },
    }[kind];
    return (
        <motion.button whileHover={{ scale: 1.02 }} whileTap={{ scale: 0.98 }} onClick={onClick}
            style={{
                display: "inline-flex", alignItems: "center", justifyContent: "center", gap: 6,
                padding: "8px 16px", borderRadius: 999, border: `1px solid ${map.bd}`, background: map.bg,
                color: map.fg, fontFamily: FONT, fontSize: 12, fontWeight: 700, cursor: "pointer",
                whiteSpace: "nowrap", ...style
            }}>
            {icon && <Icon name={icon} size={14} color={map.fg} />}{children}
        </motion.button>
    );
};

const Badge = ({ kind = "negative", children, dot = true }) => {
    const c = { negative: V.negative, warning: V.warning, positive: V.positive, info: V.brand, auto: V.purple }[kind];
    const bg = { negative: V.negativeQ, warning: V.warningQ, positive: V.positiveQ, info: V.brandQuiet, auto: V.purpleQ }[kind];
    return (
        <span style={{
            display: "inline-flex", alignItems: "center", gap: 5, background: bg, color: c,
            fontSize: 12, fontWeight: 700, padding: "3px 9px", borderRadius: 8, whiteSpace: "nowrap", fontFamily: FONT
        }}>
            {dot && <span style={{ width: 6, height: 6, borderRadius: "50%", background: c }} />}{children}
        </span>
    );
};

            ) : (
                <>
                    <div style={{ fontSize: 12, color: V.neutral, lineHeight: 1.5 }}>

                        <span style={{ fontSize: 13, fontWeight: 800, color: V.purple, width: 40, textAlign: "right" }}>±{thr}%</span>

                    <div style={{ display: "flex", gap: 8 }}>

                            {_t(lang, "btn_automate")}

            )}
        </div>

}

}

const TOUR_PAD = 10;

function getTourRect(target) {
    const el = document.querySelector(`[data-tour="${target}"]`);
    if (!el) return null;
    const r = el.getBoundingClientRect();
    return {
        top: r.top - TOUR_PAD,
        left: r.left - TOUR_PAD,
        right: r.right + TOUR_PAD,
        bottom: r.bottom + TOUR_PAD,
        width: r.width + TOUR_PAD * 2,
        height: r.height + TOUR_PAD * 2,
        cx: r.left + r.width / 2,
        cy: r.top + r.height / 2,
    };
}

/* ─── Spotlight : 4 bandes autour de l'élément ciblé ──────────────────── */
function TourSpotlight({ rect }) {
    if (!rect) return null;
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const ov = { position: "fixed", background: "rgba(10,10,15,.72)", zIndex: 10000, pointerEvents: "none" };
    return (
        <>
            <div style={{ ...ov, top: 0, left: 0, width: vw, height: Math.max(0, rect.top) }} />
            <div style={{ ...ov, top: rect.bottom, left: 0, width: vw, height: Math.max(0, vh - rect.bottom) }} />
            <div style={{ ...ov, top: rect.top, left: 0, width: Math.max(0, rect.left), height: rect.height }} />
            <div style={{ ...ov, top: rect.top, left: rect.right, width: Math.max(0, vw - rect.right), height: rect.height }} />
            {/* Anneau de focus Decathlon blue */}
            <div style={{
                position: "fixed", top: rect.top, left: rect.left, width: rect.width, height: rect.height,
                borderRadius: 10, border: "2px solid #3643BA",
                boxShadow: "0 0 0 4px rgba(54,67,186,.22), 0 8px 32px rgba(0,0,0,.3)",
                zIndex: 10001, pointerEvents: "none",
            }} />
        </>
    );
}

/* ─── Tooltip bulle avec barre de progression + nav ───────────────────── */
function TourTooltip({ rect, step, stepIdx, totalSteps, onNext, onPrev, onEnd, flowColor }) {
    const W = 300;
    const vw = window.innerWidth;
    const vh = window.innerHeight;

    // Position par rapport au rect cible
    let style = { position: "fixed", width: W, zIndex: 10002, fontFamily: FONT };
    const pos = step.pos;

    if (rect) {
        if (pos === "right") {
            style.top = Math.min(Math.max(rect.top, 12), vh - 280);
            style.left = rect.right + 16;
        } else if (pos === "left") {
            style.top = Math.min(Math.max(rect.top, 12), vh - 280);
            style.right = vw - rect.left + 16;
        } else if (pos === "bottom") {
            style.top = rect.bottom + 16;
            style.left = Math.min(Math.max(rect.cx - W / 2, 12), vw - W - 12);
        } else {
            // top
            style.bottom = vh - rect.top + 16;
            style.left = Math.min(Math.max(rect.cx - W / 2, 12), vw - W - 12);
        }
    } else {
        // Fallback : centré en bas
        style.bottom = 32;
        style.left = vw / 2 - W / 2;
    }

    const iKey = pos === "bottom" ? { y: -8 } : pos === "top" ? { y: 8 } : pos === "right" ? { x: -8 } : { x: 8 };

    return (
        <motion.div
            initial={{ opacity: 0, ...iKey }}
            animate={{ opacity: 1, y: 0, x: 0 }}
            exit={{ opacity: 0 }}
            transition={{ duration: 0.22, ease: [0.25, 0.46, 0.45, 0.94] }}
            style={{ ...style, background: "#fff", borderRadius: 12, boxShadow: "0 12px 40px rgba(0,0,0,.24)", overflow: "hidden" }}
        >
            {/* Barre de progression */}
            <div style={{ height: 3, background: "#F0F0F4" }}>
                <motion.div
                    initial={{ width: 0 }}
                    animate={{ width: `${((stepIdx + 1) / totalSteps) * 100}%` }}
                    transition={{ duration: 0.3 }}
                    style={{ height: 3, background: flowColor, borderRadius: 2 }}
                />
            </div>

            {/* Contenu */}
            <div style={{ padding: "14px 16px 10px" }}>
                <div style={{ fontSize: 13, fontWeight: 800, color: "#1A1A2E", marginBottom: 6, lineHeight: 1.3 }}>
                    {step.title}
                </div>
                <div style={{ fontSize: 12, color: "#4B5563", lineHeight: 1.65 }}>
                    {step.body}
                </div>
            </div>

            {/* Footer nav */}
            <div style={{ padding: "8px 14px 12px", display: "flex", alignItems: "center", gap: 6, borderTop: "1px solid #F3F4F6" }}>
                <span style={{ fontSize: 11, color: "#9CA3AF", flex: 1 }}>{stepIdx + 1} / {totalSteps}</span>
                {stepIdx > 0 && (
                    <button onClick={onPrev} style={{ padding: "4px 10px", borderRadius: 8, border: "1px solid #E5E7EB", background: "#fff", color: "#374151", fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: FONT }}>
                        ←
                    </button>
                )}
                {stepIdx < totalSteps - 1 ? (
                    <button onClick={onNext} style={{ padding: "4px 14px", borderRadius: 8, border: "none", background: flowColor, color: "#fff", fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: FONT }}>
                        Suivant →
                    </button>
                ) : (
                    <button onClick={onEnd} style={{ padding: "4px 14px", borderRadius: 8, border: "none", background: flowColor, color: "#fff", fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: FONT }}>
                        Terminer
                    </button>
                )}
                <button onClick={onEnd} aria-label="Quitter la visite guidée" style={{ width: 26, height: 26, borderRadius: 8, border: "1px solid #E5E7EB", background: "#F9FAFB", color: "#9CA3AF", fontSize: 14, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", fontFamily: FONT }}>
                    ×
                </button>
            </div>
        </motion.div>
    );
}

/* ─── Overlay principal : spotlight + blocker + tooltip ───────────────── */
function TourOverlay({ tourFlow, tourStep, onNext, onPrev, onEnd }) {
    const flow = TOUR_FLOWS.find(f => f.id === tourFlow);
    const step = flow?.steps[tourStep];
    const [rect, setRect] = React.useState(null);

    React.useEffect(() => {
        if (!step) return;
        const update = () => setRect(getTourRect(step.target));
        update();
        // Retry après rendu (drawer animation, etc.)
        const t1 = setTimeout(update, 120);
        const t2 = setTimeout(update, 400);
        window.addEventListener("resize", update);
        return () => { clearTimeout(t1); clearTimeout(t2); window.removeEventListener("resize", update); };
    }, [tourFlow, tourStep]);

    // Navigation clavier
    React.useEffect(() => {
        const handler = (e) => {
            if (e.key === "ArrowRight" || e.key === "Enter") { e.preventDefault(); onNext(); }
            if (e.key === "ArrowLeft") { e.preventDefault(); onPrev(); }
            if (e.key === "Escape") { e.preventDefault(); onEnd(); }
        };
        window.addEventListener("keydown", handler);
        return () => window.removeEventListener("keydown", handler);
    }, [onNext, onPrev, onEnd]);

    if (!flow || !step) return null;

    return (
        <AnimatePresence mode="wait">
            <React.Fragment key={`${tourFlow}-${tourStep}`}>
                <TourSpotlight rect={rect} />
                {/* Couche cliquable pour avancer (hors tooltip) */}
                <div
                    onClick={onNext}
                    title="Cliquez pour avancer"
                    style={{ position: "fixed", inset: 0, zIndex: 9999, cursor: "pointer" }}
                />
                <TourTooltip
                    rect={rect}
                    step={step}
                    stepIdx={tourStep}
                    totalSteps={flow.steps.length}
                    onNext={onNext}
                    onPrev={onPrev}
                    onEnd={onEnd}
                    flowColor={flow.color}
                />
            </React.Fragment>
        </AnimatePresence>
    );
}

  return a[field] ?? "";
}

function smoothPath(pts) {
    if (pts.length < 2) return "";
    let d = `M ${pts[0].x} ${pts[0].y}`;
    for (let i = 0; i < pts.length - 1; i++) {
        const p0 = pts[i - 1] || pts[i], p1 = pts[i], p2 = pts[i + 1], p3 = pts[i + 2] || p2;
        d += ` C ${p1.x + (p2.x - p0.x) / 6} ${p1.y + (p2.y - p0.y) / 6}, ${p2.x - (p3.x - p1.x) / 6} ${p2.y - (p3.y - p1.y) / 6}, ${p2.x} ${p2.y}`;
    }
    return d;
}

function Toaster({ toast, lang }) {
    const [remaining, setRemaining] = React.useState(null);
    const intervalRef = React.useRef(null);
    const msg = typeof toast === "string" ? toast : toast?.msg;
    const countdown = typeof toast === "object" ? toast?.countdown : null;
    const onUndo = typeof toast === "object" ? toast?.onUndo : null;
    React.useEffect(() => {
        if (countdown) {
            setRemaining(countdown);
            clearInterval(intervalRef.current);
            intervalRef.current = setInterval(() => {
                setRemaining(r => { if (r <= 1) { clearInterval(intervalRef.current); return 0; } return r - 1; });
            }, 1000);
        } else {
            clearInterval(intervalRef.current);
            setRemaining(null);
        }
        return () => clearInterval(intervalRef.current);
    }, [toast]);
    const hasUndo = onUndo && remaining > 0;
    const progress = countdown ? ((remaining ?? countdown) / countdown) * 100 : null;
    return (
        <AnimatePresence>
            {toast && (
                <motion.div initial={{ opacity: 0, y: 24, x: "-50%" }} animate={{ opacity: 1, y: 0, x: "-50%" }} exit={{ opacity: 0, y: 24, x: "-50%" }}
                    transition={{ duration: 0.32, ease: FPC_EASE }}
                    style={{
                        position: "absolute", bottom: 80, left: "50%", zIndex: 200, display: "flex", alignItems: "center", gap: 10,
                        background: FPC_V.neutral, color: FPC_V.white, padding: "12px 18px", borderRadius: 8,
                        boxShadow: "0 10px 32px rgba(0,0,0,.28)", fontFamily: FPC_FONT, overflow: "hidden"
                    }}>
                    <span style={{ width: 22, height: 22, borderRadius: "50%", background: FPC_V.positive, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                        <FPC_Icon name="check" size={13} color="#fff" />
                    </span>
                    <span style={{ fontSize: 13, fontWeight: 700 }}>{msg}</span>
                    {hasUndo && (
                        <button onClick={onUndo}
                            style={{ marginLeft: 6, padding: "4px 12px", borderRadius: 8, background: "rgba(255,255,255,.18)", border: "1px solid rgba(255,255,255,.35)", color: FPC_V.white, fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: FPC_FONT, whiteSpace: "nowrap" }}>
                            {_t(lang, "btn_undo")} ({remaining}s)
                        </button>
                    )}
                    {progress !== null && (
                        <div style={{ position: "absolute", bottom: 0, left: 0, right: 0, height: 3, background: "rgba(255,255,255,.15)" }}>
                            <motion.div animate={{ width: `${progress}%` }} transition={{ duration: 1, ease: "linear" }} style={{ height: "100%", background: FPC_V.positive }} />
                        </div>
                    )}
                </motion.div>
            )}
        </AnimatePresence>
    );
}

function FilterField({ id, openId, setOpenId, icon, placeholder, options, multi, sel, setSel, width = 158, lang }) {
    const open = openId === id;
    const [q, setQ] = useState("");
    useEffect(() => { if (!open) setQ(""); }, [open]);
    const optLabel = (opt) => (lang === "fr" && opt[2]) ? opt[2] : opt[1];
    const filtered = options.filter((opt) => (opt[0] + " " + optLabel(opt)).toLowerCase().includes(q.toLowerCase()));
    const hasVal = multi ? sel.length > 0 : !!sel;
    const display = () => {
        if (multi) { if (sel.length === 0) return placeholder; if (sel.length <= 2) return sel.join(", "); return `${sel.length} selected`; }
        return sel || placeholder;
    };
    const choose = c => { if (multi) setSel(sel.includes(c) ? sel.filter(x => x !== c) : [...sel, c]); else { setSel(c); setOpenId(null); } };
    const clear = e => { e.stopPropagation(); setSel(multi ? [] : null); };
    return (
        <div style={{ position: "relative", width }}>
            <button onClick={() => setOpenId(open ? null : id)} style={triggerStyle(open, hasVal)}>
                {icon && <FPC_Icon name={icon} size={14} color={hasVal ? FPC_V.brand : FPC_V.quiet} />}
                <span style={{
                    flex: 1, minWidth: 0, textAlign: "left", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap",
                    fontSize: 13, fontWeight: hasVal ? 700 : 400, color: hasVal ? FPC_V.neutral : FPC_V.quiet
                }}>{display()}</span>
                {hasVal
                    ? <span onClick={clear} style={{ display: "flex", cursor: "pointer", opacity: 0.7 }}><FPC_Icon name="close" size={14} color={FPC_V.neutral} /></span>
                    : <FPC_Icon name="chevD" size={13} color={open ? FPC_V.brand : FPC_V.quiet} />}
            </button>
            {open && (
                <div style={panelStyle}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "9px 12px", borderBottom: `1px solid ${FPC_V.borderQ}`, position: "sticky", top: 0, background: FPC_V.white, borderRadius: "10px 10px 0 0" }}>
                        <FPC_Icon name="search" size={14} color={FPC_V.quiet} />
                        <input autoFocus value={q} onChange={e => setQ(e.target.value)} placeholder={_t(lang, "filter_search_placeholder")}
                            style={{ flex: 1, border: "none", outline: "none", fontFamily: FPC_FONT, fontSize: 13, color: FPC_V.neutral, background: "transparent" }} />
                    </div>
                    {filtered.map((opt) => {
                        const [c] = opt;
                        const l = optLabel(opt);
                        const on = multi ? sel.includes(c) : sel === c;
                        return (
                            <button key={c} onClick={() => choose(c)}
                                style={{
                                    display: "flex", alignItems: "center", justifyContent: "space-between", gap: 8, width: "100%", textAlign: "left",
                                    padding: "10px 14px", border: "none", borderBottom: `1px solid ${FPC_V.greyQuiet}`, background: on ? FPC_V.brandQuiet : FPC_V.white,
                                    cursor: "pointer", fontFamily: FPC_FONT
                                }}>
                                <span style={{ fontSize: 13, fontWeight: on ? 700 : 500, color: on ? FPC_V.brand : FPC_V.neutral }}>{c} - {l}</span>
                                {on && <FPC_Icon name="check" size={14} color={FPC_V.brand} />}
                            </button>
                        );
                    })}
                    {filtered.length === 0 && <div style={{ padding: 16, fontSize: 13, color: FPC_V.quiet, textAlign: "center" }}>{_t(lang, "filter_no_results")}</div>}
                </div>
            )}
        </div>
    );
}

function SavedViewsField({ id, openId, setOpenId, current, setCurrent, yourViews, setYourViews, onPickView, onSaveAsNew }) {
    const open = openId === id;
    const [mode, setMode] = useState("list"); // "list" | "actions" | "saving" | "renaming"
    const [name, setName] = useState("");
    const [renameName, setRenameName] = useState("");
    useEffect(() => { if (!open) { setMode("list"); setName(""); setRenameName(""); } }, [open]);
    const pick = v => { setCurrent(v); if (onPickView) onPickView(v); setOpenId(null); };
    const save = () => {
        const n = name.trim(); if (!n) return;
        if (onSaveAsNew) { onSaveAsNew(n); }
        else { setYourViews(v => [...v, n]); setCurrent(n); }
        setOpenId(null);
    };
    const doRename = () => { const n = renameName.trim(); if (!n) return; setYourViews(v => v.map(x => x === current ? n : x)); setCurrent(n); setOpenId(null); };
    const deleteCurrent = () => { setYourViews(v => v.filter(x => x !== current)); setCurrent(null); setOpenId(null); };
    return (
        <div style={{ position: "relative", width: 168 }}>
            <button onClick={() => setOpenId(open ? null : id)} style={triggerStyle(open, !!current)}>
                <span style={{
                    flex: 1, minWidth: 0, textAlign: "left", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap",
                    fontSize: 13, fontWeight: current ? 700 : 400, color: current ? FPC_V.neutral : FPC_V.quiet
                }}>{current || "Saved Views"}</span>
                {current
                    ? <span onClick={e => { e.stopPropagation(); setCurrent(null); }} style={{ display: "flex", cursor: "pointer", opacity: 0.7 }}><FPC_Icon name="close" size={14} color={FPC_V.neutral} /></span>
                    : <FPC_Icon name="chevD" size={13} color={open ? FPC_V.brand : FPC_V.quiet} />}
            </button>
            {open && (
                <div style={{ ...panelStyle, width: 290 }}>
                    {mode === "actions" ? (
                        <>
                            <div style={{ padding: "8px 12px", display: "flex", alignItems: "center", gap: 7, borderBottom: `1px solid ${FPC_V.borderQ}`, background: FPC_V.bgAlt }}>
                                <button onClick={() => setMode("list")} style={{ background: "none", border: "none", cursor: "pointer", padding: 0, display: "flex" }}><FPC_Icon name="chevL" size={14} color={FPC_V.quiet} /></button>
                                <span style={{ fontSize: 12, fontWeight: 700, color: FPC_V.neutral, flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{current}</span>
                            </div>
                            {[
                                { label: "Mettre à jour la vue", action: () => setOpenId(null) },
                                { label: "Enregistrer comme nouvelle vue", action: () => setMode("saving") },
                                { label: "Renommer", action: () => { setRenameName(current || ""); setMode("renaming"); } },
                                { label: "Réinitialiser les filtres", action: () => { setCurrent(null); setOpenId(null); } },
                            ].map(({ label, action }) => (
                                <button key={label} onClick={action}
                                    style={{ display: "block", width: "100%", textAlign: "left", padding: "10px 14px", border: "none", borderBottom: `1px solid ${FPC_V.borderQ}`, background: FPC_V.white, cursor: "pointer", fontFamily: FPC_FONT, fontSize: 12, fontWeight: 500, color: FPC_V.neutral }}>
                                    {label}
                                </button>
                            ))}
                            <button onClick={deleteCurrent}
                                style={{ display: "block", width: "100%", textAlign: "left", padding: "10px 14px", border: "none", background: FPC_V.white, cursor: "pointer", fontFamily: FPC_FONT, fontSize: 12, fontWeight: 700, color: FPC_V.negative }}>
                                Supprimer la vue
                            </button>
                        </>
                    ) : mode === "renaming" ? (
                        <div style={{ padding: 12, display: "flex", flexDirection: "column", gap: 8 }}>
                            <div style={{ fontSize: 12, fontWeight: 700, color: FPC_V.neutral }}>Renommer la vue</div>
                            <input autoFocus value={renameName} onChange={e => setRenameName(e.target.value)} onKeyDown={e => e.key === "Enter" && doRename()}
                                style={{ height: 32, padding: "0 10px", border: `1px solid ${FPC_V.borderN}`, borderRadius: 8, outline: "none", fontFamily: FPC_FONT, fontSize: 12 }} />
                            <div style={{ display: "flex", gap: 6 }}>
                                <button onClick={() => setMode("actions")} style={{ flex: 1, padding: "6px 0", borderRadius: 8, border: `1px solid ${FPC_V.borderQ}`, background: FPC_V.bgMain, color: FPC_V.neutral, fontFamily: FPC_FONT, fontSize: 12, cursor: "pointer" }}>Annuler</button>
                                <button onClick={doRename} style={{ flex: 1, padding: "6px 0", borderRadius: 8, border: "none", background: FPC_V.brand, color: FPC_V.white, fontFamily: FPC_FONT, fontSize: 12, fontWeight: 700, cursor: "pointer" }}>Renommer</button>
                            </div>
                        </div>
                    ) : (
                        <>
                            <div style={{ display: "flex", alignItems: "center", gap: 7, padding: "9px 12px", background: FPC_V.bgAlt }}>
                                <FPC_Icon name="user" size={13} color={FPC_V.neutral} />
                                <span style={{ fontSize: 12, fontWeight: 800, color: FPC_V.neutral }}>Mes vues</span>
                                <button onClick={() => current && yourViews.includes(current) ? setMode("actions") : setMode("saving")}
                                    aria-label="Gérer mes vues personnelles"
                                    style={{ marginLeft: "auto", background: FPC_V.brandQuiet, border: "none", borderRadius: 8, padding: "2px 8px", fontSize: 12, fontWeight: 700, color: FPC_V.brand, cursor: "pointer" }}>⋯ Gérer</button>
                            </div>
                            {yourViews.map(v => (
                                <button key={v} onClick={() => pick(v)} style={{
                                    display: "flex", alignItems: "center", justifyContent: "space-between", width: "100%", textAlign: "left",
                                    padding: "9px 12px", border: "none", borderBottom: `1px solid ${FPC_V.borderQ}`, background: current === v ? FPC_V.brandQuiet : FPC_V.white, cursor: "pointer", fontFamily: FPC_FONT
                                }}>
                                    <span style={{ fontSize: 12, fontWeight: current === v ? 700 : 500, color: current === v ? FPC_V.brand : FPC_V.neutral }}>{v}</span>
                                    {current === v && <FPC_Icon name="check" size={13} color={FPC_V.brand} />}
                                </button>
                            ))}
                            <div style={{ display: "flex", alignItems: "center", gap: 7, padding: "9px 12px", background: FPC_V.bgAlt }}>
                                <FPC_Icon name="settings" size={13} color={FPC_V.neutral} /><span style={{ fontSize: 12, fontWeight: 800, color: FPC_V.neutral }}>Shared views</span>
                            </div>
                            {SHARED_VIEWS.map(([v, code]) => (
                                <button key={v} onClick={() => pick(v)} style={{
                                    display: "flex", alignItems: "center", justifyContent: "space-between", width: "100%", textAlign: "left",
                                    padding: "9px 12px", border: "none", borderBottom: `1px solid ${FPC_V.borderQ}`, background: current === v ? FPC_V.brandQuiet : FPC_V.white, cursor: "pointer", fontFamily: FPC_FONT
                                }}>
                                    <span style={{ fontSize: 12, fontWeight: current === v ? 700 : 500, color: current === v ? FPC_V.brand : FPC_V.neutral }}>{v}</span>
                                    <span style={{ display: "flex", alignItems: "center", gap: 8 }}>
                                        <span style={{ fontSize: 12, color: FPC_V.quiet, fontVariantNumeric: "tabular-nums" }}>{code}</span>
                                        <FPC_Icon name="users" size={13} color={FPC_V.quiet} />
                                    </span>
                                </button>
                            ))}
                            <div style={{ padding: 10, position: "sticky", bottom: 0, background: FPC_V.white, borderTop: `1px solid ${FPC_V.borderQ}` }}>
                                {mode === "saving" ? (
                                    <div style={{ display: "flex", gap: 6 }}>
                                        <input autoFocus value={name} onChange={e => setName(e.target.value)} placeholder="Nom de la vue…"
                                            onKeyDown={e => e.key === "Enter" && save()}
                                            style={{ flex: 1, height: 32, padding: "0 10px", border: `1px solid ${FPC_V.borderN}`, borderRadius: 8, outline: "none", fontFamily: FPC_FONT, fontSize: 12 }} />
                                        <FPC_Pill kind="primary" onClick={save} style={{ padding: "6px 12px" }}>OK</FPC_Pill>
                                    </div>
                                ) : (
                                    <button onClick={() => setMode("saving")} style={{
                                        display: "flex", alignItems: "center", gap: 6, width: "100%", justifyContent: "center",
                                        padding: "8px 0", borderRadius: 8, border: `1px dashed ${FPC_V.brand}`, background: FPC_V.brandQuiet, color: FPC_V.brand, fontFamily: FPC_FONT, fontSize: 12, fontWeight: 700, cursor: "pointer"
                                    }}>
                                        <FPC_Icon name="plus" size={13} color={FPC_V.brand} /> Enregistrer la vue actuelle
                                    </button>
                                )}
                            </div>
                        </>
                    )}
                </div>
            )}
        </div>
    );
}

function Calendar({ view, setView, range, setRange }) {
    const y = view.getFullYear(), m = view.getMonth();
    const firstDow = (new Date(y, m, 1).getDay() + 6) % 7;
    const dim = new Date(y, m + 1, 0).getDate();
    const cells = [];
    for (let i = 0; i < firstDow; i++) cells.push(null);
    for (let d = 1; d <= dim; d++) cells.push(new Date(y, m, d));
    while (cells.length % 7) cells.push(null);
    const same = (a, b) => a && b && a.toDateString() === b.toDateString();
    const inRange = d => d && range.start && range.end && d > range.start && d < range.end;
    const click = d => {
        if (!range.start || (range.start && range.end)) setRange({ start: d, end: null });
        else if (d < range.start) setRange({ start: d, end: range.start });
        else setRange({ start: range.start, end: d });
    };
    return (
        <div style={{ width: 250 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
                <button onClick={() => setView(new Date(y, m - 1, 1))} style={{ background: "none", border: "none", cursor: "pointer", padding: 4 }}><FPC_Icon name="chevL" size={16} color={FPC_V.neutral} /></button>
                <span style={{ fontSize: 13, fontWeight: 800, color: FPC_V.neutral }}>{["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"][m]} {y}</span>
                <button onClick={() => setView(new Date(y, m + 1, 1))} style={{ background: "none", border: "none", cursor: "pointer", padding: 4 }}><FPC_Icon name="chevR" size={16} color={FPC_V.neutral} /></button>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 2 }}>
                {["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"].map(d => <div key={d} style={{ textAlign: "center", fontSize: 12, fontWeight: 700, color: FPC_V.quiet, padding: "2px 0" }}>{d}</div>)}
                {cells.map((d, i) => {
                    if (!d) return <div key={i} />;
                    const isEdge = same(d, range.start) || same(d, range.end);
                    const mid = inRange(d);
                    return (
                        <button key={i} onClick={() => click(d)}
                            style={{
                                height: 30, border: "none", borderRadius: 8, cursor: "pointer", fontFamily: FPC_FONT, fontSize: 12, fontWeight: isEdge ? 800 : 500,
                                background: isEdge ? FPC_V.brand : mid ? FPC_V.brandQuiet : "transparent", color: isEdge ? FPC_V.white : mid ? FPC_V.brand : FPC_V.neutral
                            }}>
                            {d.getDate()}
                        </button>
                    );
                })}
            </div>
        </div>
    );
}

function TimeField({ id, openId, setOpenId, value, setValue }) {
    const open = openId === id;
    const [preset, setPreset] = useState(null);
    const [view, setView] = useState(new Date(2026, 0, 1));
    const [range, setRange] = useState({ start: null, end: null });
    useEffect(() => { if (open) { setPreset(null); setRange({ start: null, end: null }); setView(new Date(2026, 0, 1)); } }, [open]);
    const apply = () => {
        if (range.start && range.end) setValue(`${fmtD(range.start)} - ${fmtD(range.end)}`);
        else if (preset) setValue(preset);
        setOpenId(null);
    };
    const clearAll = () => { setPreset(null); setRange({ start: null, end: null }); setValue(null); };
    return (
        <div style={{ position: "relative", width: 178 }}>
            <button onClick={() => setOpenId(open ? null : id)} style={triggerStyle(open, !!value)}>
                <FPC_Icon name="calendar" size={14} color={value ? FPC_V.brand : open ? FPC_V.brand : FPC_V.quiet} />
                <span style={{
                    flex: 1, minWidth: 0, textAlign: "left", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap",
                    fontSize: 13, fontWeight: value ? 700 : 400, color: value ? FPC_V.neutral : FPC_V.quiet
                }}>{value || "Time Period"}</span>
                {value
                    ? <span onClick={e => { e.stopPropagation(); setValue(null); }} style={{ display: "flex", cursor: "pointer", opacity: 0.7 }}><FPC_Icon name="close" size={14} color={FPC_V.neutral} /></span>
                    : <FPC_Icon name="chevD" size={13} color={open ? FPC_V.brand : FPC_V.quiet} />}
            </button>
            {open && (
                <div style={{
                    position: "absolute", top: "calc(100% + 6px)", right: 0, width: 420, background: FPC_V.white, border: `1px solid ${FPC_V.borderQ}`,
                    borderRadius: 8, boxShadow: "0 10px 30px rgba(0,0,0,.14)", zIndex: 5, padding: 14
                }}>
                    <div style={{ display: "flex", gap: 14 }}>
                        <div style={{ display: "flex", flexDirection: "column", gap: 6, paddingTop: 4 }}>
                            {TIME_PRESETS.map(p => (
                                <button key={p} onClick={() => setPreset(p)} style={{
                                    display: "flex", alignItems: "center", justifyContent: "space-between", gap: 10,
                                    padding: "7px 8px", border: "none", borderRadius: 8, background: preset === p ? FPC_V.brandQuiet : "transparent", cursor: "pointer", fontFamily: FPC_FONT,
                                    fontSize: 12, fontWeight: preset === p ? 700 : 500, color: preset === p ? FPC_V.brand : FPC_V.neutral, whiteSpace: "nowrap"
                                }}>
                                    {p}{preset === p && <FPC_Icon name="check" size={13} color={FPC_V.brand} />}
                                </button>
                            ))}
                        </div>
                        <Calendar view={view} setView={setView} range={range} setRange={setRange} />
                    </div>
                    <div style={{ display: "flex", alignItems: "center", marginTop: 12, paddingTop: 10, borderTop: `1px solid ${FPC_V.borderQ}` }}>
                        <button onClick={clearAll} style={{ background: "none", border: "none", cursor: "pointer", color: FPC_V.brand, fontFamily: FPC_FONT, fontSize: 12, fontWeight: 700 }}>Clear filters</button>
                        <div style={{ flex: 1 }} />
                        <FPC_Pill kind="secondary" onClick={() => setOpenId(null)} style={{ padding: "6px 14px", marginRight: 8 }}>Cancel</FPC_Pill>
                        <FPC_Pill kind="primary" onClick={apply} style={{ padding: "6px 16px" }}>Apply</FPC_Pill>
                    </div>
                </div>
            )}
        </div>
    );
}

function ActionBar({ alert, persona = "ZDP", onOpenSandbox, onOpenAnalyze, onReset: onResetProp, lang }) {
    const [openId, setOpenId] = useState(null);
    const [family, setFamily] = useState([]);
    const [warehouse, setWarehouse] = useState([]);
    const [zone, setZone] = useState(null);
    const [view, setView] = useState(null);
    const [yourViews, setYourViews] = useState(["WINTER FAMILIES", "RAIN CLUSTER"]);
    const [period, setPeriod] = useState(null);
    const [item, setItem] = useState([]);
    const [viewShareOpen, setViewShareOpen] = useState(false);
    const [viewToShare, setViewToShare] = useState(null);

    const lbl = ACTION_BAR_LABELS(lang)[persona] || ACTION_BAR_LABELS(lang).ZDP;

    // Sélectionner une alerte pré-remplit les filtres → vue créable en 1 clic
    useEffect(() => {
        if (!alert) return;
        setFamily(alert.family ? [alert.family] : []);
        setWarehouse(alert.warehouse ? [alert.warehouse] : []);
        setZone(alert.zone || null);
        setItem(alert.item ? [alert.item] : []);
        setView(null);
    }, [alert && alert.id]);

    const handlePickView = (viewName) => {
        const preset = VIEW_PRESETS[viewName];
        if (!preset) return;
        const z = preset.zone || zone;
        const fam = preset.family || [];
        const itm = preset.item || [];
        const wh = preset.warehouse || [];
        setZone(z);
        setFamily(fam);
        setItem(itm);
        setWarehouse(wh);
        setPeriod(null);
        // trigger chart + table update
        if (onOpenAnalyze) onOpenAnalyze(fam, wh, z, null);
    };

    // ── Logique d'activation du bouton Analyser ──────────────────────────────
    // Valeurs originales pré-remplies par l'alerte
    const alertFamily    = alert?.family    ? [alert.family]    : [];
    const alertItem      = alert?.item      ? [alert.item]      : [];
    const alertWarehouse = alert?.warehouse ? [alert.warehouse] : [];
    const alertZone      = alert?.zone      || null;

    // L'utilisateur a-t-il modifié le scope par rapport à l'alerte ?
    const hasModifiedFromAlert = !!(alert && (
        JSON.stringify([...family].sort())    !== JSON.stringify([...alertFamily].sort())    ||
        JSON.stringify([...item].sort())      !== JSON.stringify([...alertItem].sort())      ||
        JSON.stringify([...warehouse].sort()) !== JSON.stringify([...alertWarehouse].sort()) ||
        zone !== alertZone ||
        period !== null
    ));

    const hasAnyScope = family.length > 0 || item.length > 0 || warehouse.length > 0 || zone !== null;

    // Actif si : (sans alerte + au moins un filtre) OU (avec alerte + scope modifié)
    const analyzeActive = (!alert && hasAnyScope) || hasModifiedFromAlert;
    // Totalement grisé (analyse déjà chargée) si alerte présente sans modification
    const alreadyLoaded = !!(alert && !hasModifiedFromAlert);

    // ── Reset : revient au scope supply zone + produit global ────────────────
    const DEFAULT_ZONE = ZONES[0][0]; // "Z001"
    const handleReset = () => {
        setFamily([]);
        setItem([]);
        setWarehouse([]);
        setPeriod(null);
        setZone(DEFAULT_ZONE);
        setView(null);
        if (onResetProp) onResetProp();
    };

    return (
        <>
        <div style={{
            position: "relative", zIndex: 60, flexShrink: 0,
            background: FPC_V.bgMain, borderBottom: `1px solid ${FPC_V.borderQ}`,
            display: "flex", alignItems: "center", gap: 8,
            padding: "8px 16px", fontFamily: FPC_FONT,
        }}>
            {openId && <div onClick={() => setOpenId(null)} style={{ position: "fixed", inset: 0, zIndex: 1 }} />}

            <FieldGroup label={lbl.views}>
                <SavedViewsField id="views" openId={openId} setOpenId={setOpenId} current={view} setCurrent={setView} yourViews={yourViews} setYourViews={setYourViews}
                    onPickView={handlePickView}
                    onSaveAsNew={(n) => { setViewToShare(n); setViewShareOpen(true); }} />
            </FieldGroup>

            {/* séparateur */}
            <div style={{ width: 1, height: 32, background: FPC_V.borderQ, flexShrink: 0 }} />

            <FieldGroup label={lbl.zone}>
                <FilterField id="zone" openId={openId} setOpenId={setOpenId} placeholder={_t(lang, "filter_placeholder_all_f")} options={ZONES} sel={zone} setSel={setZone} lang={lang} />
            </FieldGroup>
            <FieldGroup label={lbl.family}>
                <FilterField id="family" openId={openId} setOpenId={setOpenId} placeholder={_t(lang, "filter_placeholder_all_f")} options={FAMILIES} multi sel={family} setSel={setFamily} lang={lang} />
            </FieldGroup>
            <FieldGroup label={lbl.item}>
                <FilterField id="item" openId={openId} setOpenId={setOpenId} placeholder={_t(lang, "filter_placeholder_all_m")} options={ITEMS} multi sel={item} setSel={setItem} lang={lang} />
            </FieldGroup>
            <FieldGroup label={lbl.warehouse}>
                <FilterField id="wh" openId={openId} setOpenId={setOpenId} placeholder={_t(lang, "filter_placeholder_all_m")} options={WAREHOUSES} multi sel={warehouse} setSel={setWarehouse} lang={lang} />
            </FieldGroup>

            {/* séparateur avant Time + CTAs — même spacing que le reste */}
            <div style={{ width: 1, height: 32, background: FPC_V.borderQ, flexShrink: 0 }} />

            <FieldGroup label={lbl.time}>
                <TimeField id="time" openId={openId} setOpenId={setOpenId} value={period} setValue={setPeriod} />
            </FieldGroup>

            {/* ── Bouton Analyser ── */}
            <div style={{ display: "flex", flexDirection: "column", gap: 3 }}>
                <span style={{ fontSize: 10, color: "transparent" }}>·</span>
                <button
                    disabled={!analyzeActive}
                    onClick={() => analyzeActive && onOpenAnalyze && onOpenAnalyze(family, warehouse, zone, period)}
                    title={alreadyLoaded
                        ? (lang === "en" ? "Analysis already loaded — modify the scope to re-run" : "Analyse déjà chargée — modifiez le scope pour relancer")
                        : (!hasAnyScope && !alert ? (lang === "en" ? "Select at least one filter" : "Sélectionnez au moins un filtre") : "")
                    }
                    style={{
                        display: "flex", alignItems: "center", gap: 6,
                        padding: "0 14px", height: 32, borderRadius: 8,
                        background: analyzeActive ? "#3643BA" : FPC_V.greyQuiet,
                        border: analyzeActive ? "none" : `1px solid ${FPC_V.borderQ}`,
                        color: analyzeActive ? FPC_V.white : FPC_V.quiet,
                        fontFamily: FPC_FONT, fontSize: 12, fontWeight: 700,
                        cursor: analyzeActive ? "pointer" : "not-allowed",
                        whiteSpace: "nowrap",
                        boxShadow: analyzeActive ? "0 2px 8px rgba(54,67,186,0.30)" : "none",
                        transition: "all 0.15s",
                        opacity: alreadyLoaded ? 0.42 : 1,
                    }}
                    onMouseEnter={e => { if (analyzeActive) e.currentTarget.style.opacity = "0.85"; }}
                    onMouseLeave={e => { e.currentTarget.style.opacity = alreadyLoaded ? "0.42" : "1"; }}
                >
                    <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
                        <circle cx="7" cy="7" r="5" stroke="currentColor" strokeWidth="1.5"/>
                        <path d="M11 11l3 3" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/>
                    </svg>
                    {lang === "en" ? "Analyze" : "Analyser"}
                </button>
            </div>

            {/* ── Bouton Reset scope ── */}
            <div style={{ display: "flex", flexDirection: "column", gap: 3 }}>
                <span style={{ fontSize: 10, color: "transparent" }}>·</span>
                <button
                    onClick={handleReset}
                    title={lang === "en" ? "Reset to default scope (supply zone, all products)" : "Réinitialiser le scope (supply zone, tous produits)"}
                    style={{
                        display: "flex", alignItems: "center", justifyContent: "center",
                        width: 32, height: 32, borderRadius: 8, flexShrink: 0,
                        background: FPC_V.bgAlt, border: `1px solid ${FPC_V.borderQ}`,
                        color: FPC_V.quiet, cursor: "pointer",
                        transition: "all 0.15s",
                    }}
                    onMouseEnter={e => { e.currentTarget.style.background = FPC_V.greyQuiet; e.currentTarget.style.color = FPC_V.neutral; }}
                    onMouseLeave={e => { e.currentTarget.style.background = FPC_V.bgAlt; e.currentTarget.style.color = FPC_V.quiet; }}
                >
                    {/* rotate-ccw icon */}
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
                        <path d="M3 3v5h5"/>
                    </svg>
                </button>
            </div>
        </div>
        <AnimatePresence>
            {viewShareOpen && viewToShare && (
                <ViewShareModal viewName={viewToShare}
                    onClose={() => { setViewShareOpen(false); setViewToShare(null); }}
                    onConfirm={() => { setYourViews(v => v.includes(viewToShare) ? v : [...v, viewToShare]); setView(viewToShare); setViewShareOpen(false); setViewToShare(null); }} />
            )}
        </AnimatePresence>
        </>
    );
}

const METRIC_TIPS = {
    WAPE: { def: "Weighted Absolute Percentage Error — mesure l'écart moyen entre la prévision et la réalité.", seuil: "Seuil d'alerte : > 15 % sur 4 semaines glissantes." },
    BIAS: { def: "Biais de prévision — indique si la prévision est systématiquement haute (positif) ou basse (négatif).", seuil: "Seuil d'alerte : |Bias| > 1,0 sur la période." },
    QTY:  { def: "Volume de l'écart prévision/réel exprimé en pièces sur l'horizon concerné.", seuil: "Significatif à partir de 500 PCE sur un SKU." },
    GESTE: { def: "Delta geste — mesure l'écart entre la prévision native et la prévision ajustée manuellement.", seuil: "Un delta > -10 pts indique un geste dégradant la WAPE." },
};

function Tooltip({ tip, children }) {
    const [visible, setVisible] = React.useState(false);
    const ref = React.useRef(null);
    return (
        <div ref={ref} style={{ position: "relative", display: "inline-flex" }}
            onMouseEnter={() => setVisible(true)} onMouseLeave={() => setVisible(false)}
            onFocus={() => setVisible(true)} onBlur={() => setVisible(false)}>
            {children}
            {visible && tip && (
                <div role="tooltip" style={{
                    position: "absolute", bottom: "calc(100% + 8px)", left: "50%", transform: "translateX(-50%)",
                    width: 240, background: FPC_V.neutral, color: FPC_V.white, padding: "10px 12px",
                    borderRadius: 8, boxShadow: "0 8px 24px rgba(0,0,0,.22)", zIndex: 9999,
                    pointerEvents: "none"
                }}>
                    <div style={{ fontSize: 12, fontWeight: 700, marginBottom: 4, color: "#fff" }}>{tip.def}</div>
                    <div style={{ fontSize: 12, color: "#A8B0C4", borderTop: "1px solid rgba(255,255,255,.12)", paddingTop: 6, marginTop: 4 }}>{tip.seuil}</div>
                    {/* Arrow */}
                    <div style={{ position: "absolute", bottom: -5, left: "50%", transform: "translateX(-50%) rotate(45deg)", width: 10, height: 10, background: FPC_V.neutral }} />
                </div>
            )}
        </div>
    );
}

function MetricsBar({ alert, lang }) {
    const conf = alert ? parseInt(alert.ai, 10) || 0 : 0;
    const isDive = alert?.dive === true;
    const metrics = [["WAPE", alert?.wape ?? "—"], ["BIAS", alert?.bias ?? "—"], ["QTY", alert?.qty ?? "—"]];
    return (

                <Tooltip key={k} tip={METRIC_TIPS[k]}>
                    <div tabIndex={0} style={{ display: "flex", flexDirection: "column", lineHeight: 1.15, minWidth: 52, padding: "4px 10px", borderRadius: 8, background: FPC_V.bgAlt, border: `1px solid ${FPC_V.borderQ}`, cursor: "help" }}>

                            {k}
                            <span style={{ fontSize: 12, color: FPC_V.borderN, fontWeight: 400 }}>ⓘ</span>
                        </span>
                        <span style={{ fontSize: 18, fontWeight: 800, color: FPC_V.neutral, fontVariantNumeric: "tabular-nums" }}>{v}</span>
                    </div>
                </Tooltip>
            ))}

// Renders the causal chain title as styled segments: RC1 · RC2 · RC3 · Objet
function AlertTitle({ a, lang }) {
    const parts = (lang === "en" && a.title_en ? a.title_en : a.title).split(" · ");
    return (
        <span style={{ fontSize: 13, fontWeight: 700, color: FPC_V.neutral, lineHeight: 1.45, display: "block" }}>
            {parts.map((p, i) => (
                <span key={i}>
                    {i > 0 && <span style={{ color: FPC_V.borderN, fontWeight: 400, margin: "0 4px" }}>·</span>}
                    <span style={{ color: i === 0 ? sevColor(a.sev) : i === parts.length - 1 ? FPC_V.neutral : FPC_V.quiet, fontWeight: i === 0 || i === parts.length - 1 ? 800 : 600 }}>
                        {p}
                    </span>
                </span>
            ))}
        </span>
    );
}

function AlertCard({ a, sel, treated, ghosted, onClick, onCTA, onDismiss, lang }) {
    const c = sevColor(a.sev), bg = sevBg(a.sev);
    const desc = lang === "en" ? (a.aiDesc_en || a.aiDesc) : a.aiDesc;
    const unreadMsgs = !treated && !ghosted
        ? FPC_NOTIFICATIONS_DATA.filter(n => n.alertId === a.id && n.type === "received" && n.status === "unread").length
        : 0;
    return (
        <div style={{ position: "relative", marginBottom: 8 }}>
            <button onClick={onClick}
                style={{
                    display: "block", width: "100%", textAlign: "left",
                    padding: "12px 14px",
                    cursor: "pointer", fontFamily: FPC_FONT,
                    background: ghosted ? FPC_V.bgAlt : sel ? `${bg}60` : FPC_V.bgMain,
                    border: `1px solid ${ghosted ? FPC_V.borderQ : sel ? c : FPC_V.borderQ}`,
                    borderLeft: `3px solid ${ghosted ? FPC_V.borderQ : c}`,
                    borderRadius: 8,
                    boxShadow: sel && !ghosted ? `0 2px 8px ${bg}` : "none",
                    opacity: treated ? 0.5 : ghosted ? 0.38 : 1,
                    minHeight: 0, transition: "all .18s"
                }}>

                {/* ── Row 1 : sévérité + badges droite ── */}
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
                    {treated
                        ? <FPC_Badge kind="positive">{_t(lang, "badge_treated")}</FPC_Badge>
                        : ghosted
                        ? <span style={{ fontSize: 11, color: FPC_V.quiet, fontStyle: "italic" }}>{_t(lang, "alert_ghosted")}</span>
                        : <span style={{ display: "inline-flex", alignItems: "center", gap: 5, background: bg, color: c, fontSize: 11, fontWeight: 800, padding: "3px 9px", borderRadius: 999 }}>
                            <span style={{ width: 6, height: 6, borderRadius: "50%", background: c, flexShrink: 0 }} />{a.sev}
                          </span>}
                    <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                        {unreadMsgs > 0 && (
                            <span style={{ display: "inline-flex", alignItems: "center", gap: 4, background: FPC_V.warningQ, color: FPC_V.warning, fontSize: 11, fontWeight: 700, padding: "3px 8px", borderRadius: 999 }}>
                                <FPC_Icon name="messageCircle" size={10} color={FPC_V.warning} />
                                {unreadMsgs}
                            </span>
                        )}
                        {!a.dive && !ghosted && (
                            <span style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 11, fontWeight: 800, color: FPC_V.purple }}>
                                <FPC_Icon name="sparkle" size={10} color={FPC_V.purple} /> {a.ai}%
                            </span>
                        )}
                    </div>
                </div>

                {!ghosted && <>
                    {/* ── Row 2 : titre chaîne causale ── */}
                    <div style={{ marginBottom: 8 }}>
                        <AlertTitle a={a} lang={lang} />
                    </div>

                    {/* ── Row 3 : tags lieu + canal ── */}
                    <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: desc && !treated ? 8 : 0, flexWrap: "wrap" }}>
                        {a.tagLieu && (
                            <span style={{ display: "inline-flex", alignItems: "center", gap: 4, padding: "2px 8px", borderRadius: 6, background: FPC_V.brandQuiet, color: FPC_V.brand, fontSize: 11, fontWeight: 700 }}>
                                <FPC_Icon name="mapPin" size={10} color={FPC_V.brand} />{a.tagLieu}
                            </span>
                        )}
                        {a.tagCanal && (
                            <span style={{ padding: "2px 8px", borderRadius: 6, background: FPC_V.greyQuiet, color: FPC_V.quiet, fontSize: 11, fontWeight: 600 }}>
                                {a.tagCanal}
                            </span>
                        )}
                        {a.periode && (
                            <span style={{ padding: "2px 8px", borderRadius: 6, background: FPC_V.warningQ, color: FPC_V.warning, fontSize: 11, fontWeight: 700 }}>
                                {a.periode}
                            </span>
                        )}
                    </div>

                    {/* ── Row 4 : CTA ── */}
                    {!treated && (
                        <div>
                            {a.dive === false ? (
                                <motion.button whileHover={{ scale: 1.02 }} onClick={e => { e.stopPropagation(); onCTA && onCTA(); }}
                                    aria-label={`Voir les recommandations IA pour : ${a.title}`}
                                    style={{ display: "inline-flex", alignItems: "center", gap: 5, padding: "5px 12px", borderRadius: 8, background: FPC_V.purple, color: FPC_V.white, border: "none", fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: FPC_FONT }}>
                                    <FPC_Icon name="sparkle" size={12} color={FPC_V.white} aria-hidden="true" /> {_t(lang, "btn_see_reco_ia")}
                                </motion.button>
                            ) : (
                                <motion.button whileHover={{ scale: 1.02 }} onClick={e => { e.stopPropagation(); onCTA && onCTA(); }}
                                    aria-label={`Ouvrir l'ajustement manuel pour : ${a.title}`}
                                    style={{ display: "inline-flex", alignItems: "center", gap: 5, padding: "5px 12px", borderRadius: 8, background: FPC_V.brand, color: FPC_V.white, border: "none", fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: FPC_FONT }}>
                                    <FPC_Icon name="eye" size={12} color={FPC_V.white} aria-hidden="true" /> {_t(lang, "btn_manual_adj")}
                                </motion.button>
                            )}
                        </div>
                    )}
                </>}
            </button>
        </div>
    );
}

                </div>
                <div style={{ fontSize: 12, color: FPC_V.quiet, marginBottom: 14, lineHeight: 1.5 }}>

                    ))}
                </div>
                {reason === "other" && (
                    <textarea value={other} onChange={e => setOther(e.target.value)} placeholder="Précisez la raison…" rows={2}
                        style={{ width: "100%", marginBottom: 14, padding: "8px 11px", borderRadius: 8, border: `1px solid ${FPC_V.borderQ}`, fontFamily: FPC_FONT, fontSize: 12, color: FPC_V.neutral, resize: "vertical", boxSizing: "border-box", outline: "none" }} />
                )}
                <div style={{ display: "flex", justifyContent: "flex-end", gap: 8 }}>
                    <button onClick={onCancel} style={{ padding: "8px 16px", borderRadius: 8, border: `1px solid ${FPC_V.borderQ}`, background: FPC_V.white, color: FPC_V.quiet, fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: FPC_FONT }}>{_t(lang, "btn_cancel")}</button>
                    <button onClick={() => canSubmit && onConfirm(reason === "other" ? (other || "Autre") : reasons.find(r => r.id === reason).label)}
                        disabled={!canSubmit}
                        style={{ padding: "8px 16px", borderRadius: 8, border: "none", background: canSubmit ? FPC_V.warning : FPC_V.borderQ, color: FPC_V.white, fontSize: 12, fontWeight: 700, cursor: canSubmit ? "pointer" : "default", fontFamily: FPC_FONT, transition: "background .15s" }}>
                        {_t(lang, "btn_ignore_alert")}
                    </button>
                </div>
            </motion.div>
        </div>
    );
}

function AlertsPanel({ selected, setSelected, treated, dismissed, setDismissed, onCollapse, onSelectAlert, alerts, lang }) {
    const [tab, setTab] = useState("active");
    const [dismissing, setDismissing] = useState(new Set()); // ghost state (8s undo window)
    const timers = React.useRef({});
    const active = alerts.filter(a => !treated.includes(a.id) && !dismissed.has(a.id));
    const done = alerts.filter(a => treated.includes(a.id));
    const aiRecoList = active.filter(a => !a.dive);
    const aiDiveList = active.filter(a => a.dive);
    const aiRec = aiRecoList.length;
    const aiDive = aiDiveList.length;
    const groupHeader = (label) => (
        <div style={{ fontSize: 12, fontWeight: 700, color: FPC_V.quiet, textTransform: "uppercase", letterSpacing: "0.08em", padding: "6px 12px 4px" }}>{label}</div>
    );

    const handleDismiss = (id) => {
        setDismissing(s => { const ns = new Set(s); ns.add(id); return ns; });
        timers.current[id] = setTimeout(() => {
            setDismissed(d => { const nd = new Set(d); nd.add(id); return nd; });
            setDismissing(s => { const ns = new Set(s); ns.delete(id); return ns; });
        }, 8000);
    };
    const handleUndoDismiss = (id) => {
        clearTimeout(timers.current[id]);
        setDismissing(s => { const ns = new Set(s); ns.delete(id); return ns; });
    };

    // Combined list: active + ghosted dismissing
    const ghostIds = [...dismissing].filter(id => !dismissed.has(id));
    const ghostAlerts = alerts.filter(a => ghostIds.includes(a.id));
    const allVisible = [...active, ...ghostAlerts.filter(g => !active.find(a => a.id === g.id))];
    const visibleReco = allVisible.filter(a => !a.dive);
    const visibleDive = allVisible.filter(a => a.dive);

    return (
        <div data-tour="tour-alerts-panel" style={{
            width: 380, flexShrink: 0, background: FPC_V.bgAlt, borderRight: `1px solid ${FPC_V.borderQ}`,
            display: "flex", flexDirection: "column", overflow: "hidden"
        }}>
            <div style={{ padding: "14px 14px 10px", borderBottom: `1px solid ${FPC_V.borderQ}` }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
                    <FPC_Icon name="alert" size={16} color={FPC_V.negative} />
                    <span style={{ fontSize: 13, fontWeight: 800, color: FPC_V.neutral, letterSpacing: "0.02em" }}>{_t(lang, "alerts_panel_title")}</span>
                    <span style={{ fontSize: 12, color: FPC_V.quiet }}>· {active.length}</span>
                    <button onClick={onCollapse} title="Replier le panneau alertes" aria-label="Replier le panneau alertes" aria-expanded="true" style={{
                        marginLeft: "auto", background: FPC_V.bgMain, border: `1px solid ${FPC_V.borderQ}`,
                        borderRadius: 8, width: 26, height: 26, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer"
                    }}>
                        <FPC_Icon name="chevL" size={14} color={FPC_V.neutral} />
                    </button>
                </div>
                <div style={{ fontSize: 12, marginBottom: 10 }}>
                    <span style={{ color: FPC_V.purple, fontWeight: 800 }}><FPC_Icon name="sparkle" size={11} color={FPC_V.purple} /> {aiRec} {_t(lang, "metric_badge_reco_ia")}</span>
                    <span style={{ color: FPC_V.quiet }}> · {aiDive} Deep Dive</span>
                </div>
                <div style={{ display: "flex", gap: 6 }}>
                    {[["active", _t(lang, "alerts_tab_active"), active.length], ["treated", _t(lang, "alerts_tab_treated"), done.length]].map(([k, l, n]) => (
                        <button key={k} onClick={() => setTab(k)}
                            style={{
                                display: "flex", alignItems: "center", gap: 6, padding: "6px 12px", borderRadius: 8, border: "none", cursor: "pointer",
                                fontFamily: FPC_FONT, fontSize: 12, fontWeight: 800, background: tab === k ? FPC_V.brand : FPC_V.bgMain,
                                color: tab === k ? FPC_V.white : FPC_V.quiet, boxShadow: tab === k ? "none" : `inset 0 0 0 1px ${FPC_V.borderQ}`
                            }}>
                            {l}<span style={{
                                background: tab === k ? "rgba(255,255,255,.25)" : FPC_V.borderQ, color: tab === k ? "#fff" : FPC_V.quiet,
                                borderRadius: 999, padding: "0 7px", fontSize: 12
                            }}>{n}</span>
                        </button>
                    ))}
                </div>
            </div>
            <div style={{ flex: 1, overflowY: "auto", padding: "12px 12px 4px" }}>
                {tab === "treated" ? (
                    done.length === 0
                        ? <div style={{ padding: 24, textAlign: "center", color: FPC_V.quiet, fontSize: 12 }}>{_t(lang, "alerts_empty_treated")}</div>
                        : done.map(a => <AlertCard key={a.id} a={a} sel={selected === a.id} treated={true} onClick={() => setSelected(a.id)} onCTA={() => onSelectAlert(a)} />)
                ) : allVisible.length === 0 ? (
                    <div style={{ padding: 24, textAlign: "center" }}>
                        <div style={{ width: 40, height: 40, borderRadius: "50%", background: FPC_V.positiveQ, display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 12px" }}>
                            <FPC_Icon name="check" size={20} color={FPC_V.positive} />
                        </div>
                        <div style={{ fontSize: 13, fontWeight: 700, color: FPC_V.neutral, marginBottom: 4 }}>{_t(lang, "alerts_all_cleared")}</div>
                        <div style={{ fontSize: 12, color: FPC_V.quiet }}>{_t(lang, "alerts_next_sync")}</div>
                    </div>
                ) : (
                    <>
                        {visibleReco.length > 0 && (
                            <>
                                {groupHeader(_t(lang, "alerts_group_reco"))}
                                {visibleReco.map(a => (
                                    <div key={a.id}>
                                        <AlertCard a={a} sel={selected === a.id} treated={false}
                                            ghosted={dismissing.has(a.id)}
                                            onClick={() => !dismissing.has(a.id) && setSelected(a.id)}
                                            onCTA={() => onSelectAlert(a)}
                                            onDismiss={handleDismiss} lang={lang} />
                                        <AnimatePresence>
                                            {dismissing.has(a.id) && (
                                                <motion.div initial={{ opacity: 0, height: 0 }} animate={{ opacity: 1, height: "auto" }} exit={{ opacity: 0, height: 0 }} transition={{ duration: 0.2 }}
                                                    style={{ marginTop: -6, marginBottom: 10, display: "flex", alignItems: "center", justifyContent: "space-between", padding: "5px 10px", background: FPC_V.bgMain, border: `1px solid ${FPC_V.borderQ}`, borderRadius: 8, fontSize: 12 }}>
                                                    <span style={{ color: FPC_V.quiet }}>{_t(lang, "alert_dismissed_msg")}</span>
                                                    <button onClick={() => handleUndoDismiss(a.id)}
                                                        style={{ background: "none", border: "none", color: FPC_V.brand, fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: FPC_FONT }}>
                                                        {_t(lang, "btn_undo")}
                                                    </button>
                                                </motion.div>
                                            )}
                                        </AnimatePresence>
                                    </div>
                                ))}
                            </>
                        )}
                        {visibleDive.length > 0 && (
                            <>
                                {groupHeader(_t(lang, "alerts_group_deepdive"))}
                                {visibleDive.map(a => (
                                    <div key={a.id}>
                                        <AlertCard a={a} sel={selected === a.id} treated={false}
                                            ghosted={dismissing.has(a.id)}
                                            onClick={() => !dismissing.has(a.id) && setSelected(a.id)}
                                            onCTA={() => onSelectAlert(a)}
                                            onDismiss={handleDismiss} lang={lang} />
                                        <AnimatePresence>
                                            {dismissing.has(a.id) && (
                                                <motion.div initial={{ opacity: 0, height: 0 }} animate={{ opacity: 1, height: "auto" }} exit={{ opacity: 0, height: 0 }} transition={{ duration: 0.2 }}
                                                    style={{ marginTop: -6, marginBottom: 10, display: "flex", alignItems: "center", justifyContent: "space-between", padding: "5px 10px", background: FPC_V.bgMain, border: `1px solid ${FPC_V.borderQ}`, borderRadius: 8, fontSize: 12 }}>
                                                    <span style={{ color: FPC_V.quiet }}>{_t(lang, "alert_dismissed_msg")}</span>
                                                    <button onClick={() => handleUndoDismiss(a.id)}
                                                        style={{ background: "none", border: "none", color: FPC_V.brand, fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: FPC_FONT }}>
                                                        Annuler
                                                    </button>
                                                </motion.div>
                                            )}
                                        </AnimatePresence>
                                    </div>
                                ))}
                            </>
                        )}
                    </>
                )}
            </div>
        </div>
    );
}

    { weekIdx: 9,  icon: "📅", label: "St-Valentin · push marketing",       color: "#DB6900", type: "commercial" },
